<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rooze Panel</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif}
:root{
  --accent:#2d7a4f;--accent2:#e8f5ee;--accent-tx:#fff;
  --bg:#fff;--bg2:#f5f5f4;--bg3:#f0ede8;
  --tx:#1a1a1a;--tx2:#666;--tx3:#aaa;
  --bo:rgba(0,0,0,0.08);--bo2:rgba(0,0,0,0.12);
  --sidebar:220px;--header:56px;
  --r:10px;
  --pend-bg:#fef3c7;--pend-tx:#92400e;
  --env-bg:#dbeafe;--env-tx:#1e40af;
  --ent-bg:#dcfce7;--ent-tx:#166534;
  --anul-bg:#fee2e2;--anul-tx:#991b1b;
}
body{background:var(--bg3);color:var(--tx);display:flex;min-height:100vh}

/* ── SIDEBAR ──────────────────────────────────────────────── */
.sidebar{width:var(--sidebar);background:var(--bg);border-right:1px solid var(--bo);
  display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:50;
  transition:transform .25s}
.sidebar-logo{padding:18px 20px 12px;border-bottom:1px solid var(--bo)}
.sidebar-logo h1{font-size:18px;font-weight:800;color:var(--accent)}
.sidebar-logo span{font-size:11px;color:var(--tx3);display:block;margin-top:1px}
.nav-section{padding:10px 0}
.nav-label{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;
  letter-spacing:.08em;padding:6px 20px 4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 20px;cursor:pointer;
  font-size:13px;font-weight:500;color:var(--tx2);border:none;background:none;
  width:100%;text-align:left;border-radius:0;transition:all .12s}
.nav-item:hover{background:var(--bg2);color:var(--tx)}
.nav-item.on{background:var(--accent2);color:var(--accent);font-weight:600}
.nav-item svg{width:16px;height:16px;stroke:currentColor;stroke-width:1.8;fill:none;flex-shrink:0}
.sidebar-footer{margin-top:auto;padding:14px 20px;border-top:1px solid var(--bo)}
.user-chip{display:flex;align-items:center;gap:10px}
.av{width:30px;height:30px;border-radius:15px;background:var(--accent);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.user-name{font-size:12px;font-weight:600;color:var(--tx)}
.user-role{font-size:10px;color:var(--tx3)}
.btn-logout{padding:5px 10px;background:#fee2e2;color:#991b1b;border:none;border-radius:6px;
  font-size:11px;font-weight:600;cursor:pointer;margin-left:auto}

/* ── MAIN ─────────────────────────────────────────────────── */
.main{margin-left:var(--sidebar);flex:1;display:flex;flex-direction:column;min-height:100vh}
.header{height:var(--header);background:var(--bg);border-bottom:1px solid var(--bo);
  display:flex;align-items:center;padding:0 24px;gap:16px;position:sticky;top:0;z-index:40}
.header h2{font-size:16px;font-weight:700;color:var(--tx)}
.header-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.content{padding:24px;flex:1}

/* ── FILTER BAR ───────────────────────────────────────────── */
.filter-bar{display:flex;gap:8px;align-items:center;margin-bottom:20px;flex-wrap:wrap}
.fbtn{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;border:none;
  cursor:pointer;background:var(--bg2);color:var(--tx2);transition:all .12s}
.fbtn.on{background:var(--accent);color:#fff}
.date-range{display:flex;gap:6px;align-items:center}
.date-range input{padding:6px 10px;border:1px solid var(--bo2);border-radius:8px;
  background:var(--bg);color:var(--tx);font-size:12px;font-family:inherit;outline:none}
.btn-apply{padding:6px 14px;background:var(--accent);color:#fff;border:none;
  border-radius:8px;font-size:12px;font-weight:600;cursor:pointer}

/* ── KPI CARDS ────────────────────────────────────────────── */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.kpi{background:var(--bg);border-radius:var(--r);padding:16px 18px;border:1px solid var(--bo)}
.kpi-lbl{font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em}
.kpi-val{font-size:26px;font-weight:800;color:var(--tx);margin:4px 0 2px}
.kpi-val.g{color:var(--accent)}
.kpi-delta{font-size:11px;font-weight:600}
.kpi-delta.up{color:#059669}.kpi-delta.dn{color:#dc2626}

/* ── CARDS ────────────────────────────────────────────────── */
.card{background:var(--bg);border-radius:var(--r);border:1px solid var(--bo);padding:18px}
.card-title{font-size:12px;font-weight:700;color:var(--tx3);text-transform:uppercase;
  letter-spacing:.05em;margin-bottom:12px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}

/* ── TABLE ────────────────────────────────────────────────── */
.tbl-wrap{background:var(--bg);border-radius:var(--r);border:1px solid var(--bo);overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:var(--bg2);padding:10px 14px;text-align:left;font-size:11px;
  font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;
  border-bottom:1px solid var(--bo)}
tbody td{padding:11px 14px;border-bottom:0.5px solid var(--bo);color:var(--tx);vertical-align:middle}
tbody tr:last-child td{border:none}
tbody tr:hover{background:var(--bg2)}
.badge{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.badge.pendiente{background:var(--pend-bg);color:var(--pend-tx)}
.badge.enviado{background:var(--env-bg);color:var(--env-tx)}
.badge.entregado{background:var(--ent-bg);color:var(--ent-tx)}
.badge.anulado{background:var(--anul-bg);color:var(--anul-tx)}
.tbl-actions{display:flex;gap:6px}
.act-btn{padding:5px 10px;border:none;border-radius:6px;font-size:11px;font-weight:600;
  cursor:pointer;font-family:inherit;transition:opacity .12s}
.act-btn:hover{opacity:.8}
.act-btn.view{background:var(--accent2);color:var(--accent)}
.act-btn.edit{background:#dbeafe;color:#1e40af}
.act-btn.del{background:#fee2e2;color:#991b1b}
.pagination{display:flex;align-items:center;gap:8px;padding:12px 14px;
  border-top:1px solid var(--bo);font-size:12px;color:var(--tx2)}
.pg-btn{padding:5px 10px;border:1px solid var(--bo2);border-radius:6px;
  background:var(--bg);cursor:pointer;font-size:12px}
.pg-btn:disabled{opacity:.4;cursor:not-allowed}
.pg-info{margin:0 auto}

/* ── MODAL ────────────────────────────────────────────────── */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);
  z-index:200;align-items:center;justify-content:center}
.modal-ov.open{display:flex}
.modal{background:var(--bg);border-radius:16px;padding:28px;width:560px;
  max-width:95vw;max-height:90vh;overflow-y:auto;position:relative}
.modal h3{font-size:18px;font-weight:700;margin-bottom:20px}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;
  font-size:20px;cursor:pointer;color:var(--tx3)}
.fld{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.fld label{font-size:11px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.05em}
.fld input,.fld select,.fld textarea{background:var(--bg2);border:1px solid var(--bo2);
  border-radius:8px;padding:9px 12px;font-size:13px;color:var(--tx);font-family:inherit;outline:none}
.fld input:focus,.fld select:focus{border-color:var(--accent)}
.fld-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn-primary{width:100%;padding:11px;background:var(--accent);color:#fff;border:none;
  border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-secondary{width:100%;padding:10px;background:var(--bg2);color:var(--tx2);border:none;
  border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;font-family:inherit}
.modal-btns{display:flex;gap:10px;margin-top:16px}
.modal-btns .btn-primary,.modal-btns .btn-secondary{margin:0}
.err{background:#fee2e2;border:1px solid #fca5a5;border-radius:8px;padding:9px 12px;
  font-size:12px;color:#991b1b;display:none;margin-top:8px}

/* ── VENDOR ACCORDION ─────────────────────────────────────── */
.vcard{background:var(--bg);border-radius:var(--r);border:1px solid var(--bo);
  border-left:3px solid var(--accent);margin-bottom:10px;overflow:hidden}
.vcard-hdr{display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;cursor:pointer;user-select:none}
.vcard-hdr:hover{background:var(--bg2)}
.vcard-name{font-size:15px;font-weight:700;color:var(--accent)}
.vcard-sub{font-size:11px;color:var(--tx3);margin-top:2px}
.vcard-body{display:none;padding:0 18px 18px}
.vcard-sep{height:1px;background:var(--bo);margin-bottom:14px}
.estado-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.estado-chip{border-radius:9px;padding:10px;text-align:center}
.estado-chip .n{font-size:22px;font-weight:800}
.estado-chip .l{font-size:10px;font-weight:700;margin-top:2px}
.fin-row{display:flex;gap:8px;margin-top:12px}
.fin-box{flex:1;border-radius:9px;padding:11px;text-align:center}
.fin-box .n{font-size:18px;font-weight:800}
.fin-box .l{font-size:10px;font-weight:700;margin-top:2px}
.section-lbl{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;
  letter-spacing:.05em;margin:10px 0 5px}
.dr{display:flex;justify-content:space-between;align-items:center;
  padding:7px 0;border-bottom:0.5px solid var(--bo)}
.dr:last-child{border:none}

/* ── CHART ────────────────────────────────────────────────── */
.chart-wrap{background:var(--bg);border-radius:var(--r);border:1px solid var(--bo);padding:18px}
.chart-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.chart-title{font-size:12px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em}
.chart-legend{display:flex;gap:12px;font-size:11px}

/* ── META PROGRESS ────────────────────────────────────────── */
.meta-hero{background:linear-gradient(135deg,#1a4a30,#2d7a4f);border-radius:var(--r);
  padding:20px;color:#fff;margin-bottom:14px}
.meta-prog{height:8px;background:rgba(255,255,255,0.2);border-radius:4px;margin:12px 0 6px;overflow:hidden}
.meta-bar{height:100%;background:#fff;border-radius:4px;transition:width .6s ease}
.meta-ticks{display:flex;justify-content:space-between;font-size:10px;opacity:.6}
.meta-levels{display:flex;flex-direction:column;gap:5px}
.meta-level{display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px;border-radius:8px;background:var(--bg2)}
.meta-level.cur{background:var(--accent2);border:1px solid var(--accent)}

/* ── ZONE BARS ────────────────────────────────────────────── */
.zone-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--bo)}
.zone-row:last-child{border:none}
.zdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.zname{font-size:12px;font-weight:500;width:80px;flex-shrink:0}
.zwrap{flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.zbar{height:100%;border-radius:3px}
.zcount{font-size:13px;font-weight:700;width:28px;text-align:right}

/* ── LOGIN ────────────────────────────────────────────────── */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:var(--bg3);width:100%}
.login-box{background:var(--bg);border-radius:16px;padding:40px;width:380px;
  box-shadow:0 8px 40px rgba(0,0,0,0.1)}
.login-box h1{font-size:22px;font-weight:800;color:var(--accent);margin-bottom:4px}
.login-box p{font-size:13px;color:var(--tx2);margin-bottom:24px}

/* ── TOAST ────────────────────────────────────────────────── */
.toast{position:fixed;bottom:24px;right:24px;background:#1a1a1a;color:#fff;
  padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;z-index:999;
  opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}

/* ── SPIN ─────────────────────────────────────────────────── */
.spin{width:32px;height:32px;border:3px solid var(--bo);border-top-color:var(--accent);
  border-radius:50%;animation:spin .7s linear infinite;margin:40px auto;display:block}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px;color:var(--tx3);font-size:14px}

/* ── STATUS SELECTOR ──────────────────────────────────────── */
.sopt{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;
  border:none;background:var(--bg2);color:var(--tx2);font-family:inherit}
.sopt.pendiente.on{background:var(--pend-bg);color:var(--pend-tx)}
.sopt.enviado.on{background:var(--env-bg);color:var(--env-tx)}
.sopt.entregado.on{background:var(--ent-bg);color:var(--ent-tx)}
.sopt.anulado.on{background:var(--anul-bg);color:var(--anul-tx)}

/* ── RESPONSIVE ───────────────────────────────────────────── */
@media(max-width:900px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .kpi-row{grid-template-columns:repeat(2,1fr)}
  .estado-grid{grid-template-columns:repeat(2,1fr)}
  .fld-row{grid-template-columns:1fr}
  .grid-2,.grid-3{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-page" id="pg-login">
  <div class="login-box">
    <h1>Rooze Panel</h1>
    <p>Panel administrativo web — ingresa con tu cuenta</p>
    <div class="fld"><label>Correo</label><input type="email" id="li-email" placeholder="tu@correo.com" autocomplete="email"></div>
    <div class="fld"><label>Contraseña</label><input type="password" id="li-pass" placeholder="••••••••"></div>
    <div class="err" id="li-err"></div>
    <button class="btn-primary" id="btn-login" style="margin-top:8px">Iniciar sesión</button>
  </div>
</div>

<!-- APP -->
<div id="pg-app" style="display:none;width:100%;display:none">

  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <h1>🟢 Rooze</h1>
      <span>Panel Administrativo</span>
    </div>

    <div class="nav-section">
      <div class="nav-label" id="nav-label-main">Principal</div>
      <button class="nav-item on" id="nb-dashboard" onclick="showModule('dashboard')">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Dashboard
      </button>
      <button class="nav-item" id="nb-ventas" onclick="showModule('ventas')">
        <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
        Ventas
      </button>

      <button class="nav-item" id="nb-resumen" onclick="showModule('resumen')">
        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        Vendedores
      </button>
      <button class="nav-item" id="nb-config" onclick="showModule('config')">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        Configuración
      </button>
    </div>

    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="av" id="user-av">?</div>
        <div>
          <div class="user-name" id="user-name">Cargando...</div>
          <div class="user-role" id="user-role"></div>
        </div>
        <button class="btn-logout" onclick="logout()">Salir</button>
      </div>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <div class="main">
    <div class="header">
      <h2 id="page-title">Dashboard</h2>
      <div class="header-right">
        <div class="filter-bar" style="margin-bottom:0" id="global-filter">
          <button class="fbtn on" onclick="setGlobalPeriod('today',this)">Hoy</button>
          <button class="fbtn" onclick="setGlobalPeriod('yesterday',this)">Ayer</button>
          <button class="fbtn" onclick="setGlobalPeriod('week',this)">Semana</button>
          <button class="fbtn" onclick="setGlobalPeriod('15days',this)">15 días</button>
          <button class="fbtn" onclick="setGlobalPeriod('month',this)">Mes</button>
          <button class="fbtn" onclick="setGlobalPeriod('custom',this)">Personalizado</button>
          <div class="date-range" id="custom-range" style="display:none">
            <input type="date" id="gf-from">
            <span style="color:var(--tx3)">→</span>
            <input type="date" id="gf-to">
            <button class="btn-apply" onclick="applyCustom()">Ver</button>
          </div>
        </div>
      </div>
    </div>

    <div class="content">

      <!-- ── DASHBOARD ─────────────────────────────────── -->
      <div id="mod-dashboard">
        <div class="kpi-row" id="kpi-row"><div class="spin"></div></div>
        <div class="grid-2" style="margin-bottom:14px">
          <div class="chart-wrap">
            <div class="chart-hdr">
              <div class="chart-title">Evolución de ingresos</div>
              <div class="chart-legend">
                <span style="color:var(--accent)">⬤ Actual</span>
                <span style="color:#93c5fd">– – Anterior</span>
              </div>
            </div>
            <div id="dash-chart"><div class="spin"></div></div>
          </div>
          <div class="card">
            <div class="card-title">Ventas por zona</div>
            <div id="zona-bars"></div>
            <div class="card-title" style="margin-top:16px">Resumen estados</div>
            <div id="estado-resumen"></div>
          </div>
        </div>
      </div>

      <!-- ── VENTAS ──────────────────────────────────── -->
      <div id="mod-ventas" style="display:none">
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px">
          <!-- Vendor select (admin/super) -->
          <div id="ventas-vend-wrap" style="display:none;flex-direction:column;gap:3px">
            <label style="font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em">Vendedor</label>
            <select id="ventas-vend-sel" onchange="setVentasVendedor(this.value)"
              style="padding:7px 12px;border:1.5px solid var(--accent);border-radius:8px;background:var(--bg);color:var(--tx);font-size:13px;font-weight:600;cursor:pointer;min-width:180px;outline:none;font-family:inherit">
              <option value="all">Todos los vendedores</option>
            </select>
          </div>
          <!-- Status chips -->
          <div class="filter-bar" id="ventas-status-filter" style="margin-bottom:0;flex-wrap:wrap">
            <button class="fbtn on" onclick="setVentasFilt('all',this)">Todos</button>
            <button class="fbtn" onclick="setVentasFilt('pendiente',this)" style="background:var(--pend-bg);color:var(--pend-tx)">Pendiente</button>
            <button class="fbtn" onclick="setVentasFilt('enviado',this)" style="background:var(--env-bg);color:var(--env-tx)">Enviado</button>
            <button class="fbtn" onclick="setVentasFilt('entregado',this)" style="background:var(--ent-bg);color:var(--ent-tx)">Entregado</button>
            <button class="fbtn" onclick="setVentasFilt('anulado',this)" style="background:var(--anul-bg);color:var(--anul-tx)">Anulado</button>
          </div>
          <button class="btn-primary" style="width:auto;padding:7px 16px;font-size:13px;margin-left:auto" onclick="openNuevaVenta()">+ Nueva venta</button>
        </div>
        <div class="tbl-wrap" id="ventas-tbl-wrap"><div class="spin"></div></div>
      </div>

      <!-- ── VENDEDORES ──────────────────────────────── -->
      <div id="mod-resumen" style="display:none">
        <div id="resumen-content"><div class="spin"></div></div>
      </div>

      <!-- ── CONFIG ─────────────────────────────────── -->
      <div id="mod-config" style="display:none">
        <div id="config-content"><div class="spin"></div></div>
      </div>

    </div><!-- /content -->
  </div><!-- /main -->
</div><!-- /pg-app -->

<!-- ── MODAL: DETALLE VENTA ──────────────────────────────── -->
<div class="modal-ov" id="ov-detalle">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('ov-detalle')">✕</button>
    <div id="detalle-body"></div>
  </div>
</div>

// ── Global number formatting ─────────────────────────────────────────────
function fmtN(n){
  // Format number with thousands separator, 0 decimals
  if(n===null||n===undefined||isNaN(n))return '0';
  return Number(n).toLocaleString('es-PE',{maximumFractionDigits:0});
}
function fmtC(n){
  // Format currency: S/ 1,234
  if(n===null||n===undefined||isNaN(n))return 'S/ 0';
  return 'S/ '+Number(n).toLocaleString('es-PE',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function fmtC0(n){
  // Format currency no decimals: S/ 1,234
  if(n===null||n===undefined||isNaN(n))return 'S/ 0';
  return 'S/ '+fmtN(n);
}

// ═══ STATE ══════════════════════════════════════════════════
let cu=null, orders=[], cfg={productos:[],deliveryCostos:{},salaryScale:[]};

// ═══ SHARED FUNCTIONS (from ventas.html) ═══════════════════
function dayStart(y,m,d){
  // Local midnight - safe for date comparisons since fv uses local noon
  return new Date(y,m,d,0,0,0).getTime();
}

function dayEnd(y,m,d){
  // End of local day
  return new Date(y,m,d,23,59,59,999).getTime();
}

function weekStart(){
  const n=new Date();
  const day=n.getDay()||7;
  const monday=new Date(n.getFullYear(),n.getMonth(),n.getDate()-(day-1),0,0,0);
  return monday.getTime();
}

function periodStart(p){
  const n=new Date();
  const Y=n.getFullYear(),M=n.getMonth(),D=n.getDate();
  if(p==='today')     return dayStart(Y,M,D);
  if(p==='yesterday') return dayStart(Y,M,D-1);
  if(p==='week')      return weekStart();
  if(p==='15days')    return dayStart(Y,M,D-15);
  if(p==='month')     return dayStart(Y,M,1);
  if(p==='30days')    return dayStart(Y,M,D-30);
  if(p==='custom')    return resCustomFrom;
  return 0;
}

function periodEnd(p){
  const n=new Date();
  const Y=n.getFullYear(),M=n.getMonth(),D=n.getDate();
  if(p==='yesterday') return dayEnd(Y,M,D-1);
  if(p==='custom')    return resCustomTo;
  return dayEnd(Y,M,D);
}

function ago(ts){
  const d=Date.now()-ts,m=Math.floor(d/60000),h=Math.floor(d/3600000),dy=Math.floor(d/86400000);
  if(d<60000)return'Ahora';if(m<60)return`Hace ${m}m`;if(h<24)return`Hace ${h}h`;if(dy===1)return'Ayer';return`Hace ${dy} días`;
}

function formatFecha(f){
  if(!f)return'';
  const [y,m,d]=f.split('-');
  const meses=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  return`${d} ${meses[parseInt(m)-1]}`;
}

function statusLabel(s){
  return{pendiente:'Pendiente',enviado:'Enviado',entregado:'Entregado',anulado:'Anulado'}[s]||s;
}

function getSueldo(ventas){
  let s=0;
  salaryScale.forEach(l=>{if(ventas>=l.ventas)s=l.sueldo;});
  return s;
}

function getNextLevel(ventas){
  return salaryScale.find(l=>l.ventas>ventas);
}

function calcSueldo(numVentas){
  var s=0;
  salaryScale.forEach(function(l){if(numVentas>=l.ventas)s=l.sueldo;});
  return s;
}

function getDelivery(zona){
  // Always read from current cfg - no fallback if value is 0
  var costos=cfg.deliveryCostos||{};
  var key=(zona==='Provincia')?'Provincia':'Lima';
  // Use hasOwnProperty so 0 is respected (not treated as falsy)
  return costos.hasOwnProperty(key)?Number(costos[key]):0;
}

function getCostoReal(o){
  var prod=cfg.productos?cfg.productos.find(function(x){return x.nombre===o.producto;}):null;
  var qty=o.totalCantidad||1;
  var costo=(prod&&prod.costo)?prod.costo:0;
  var delivery=getDelivery(o.zona);  // always dynamic, 0 is valid
  if(o.estado==='anulado'){
    return {costo:0, delivery:delivery, ganancia:-delivery};
  }
  return {costo:costo*qty, delivery:delivery, ganancia:(o.cobrar||0)-(costo*qty)-delivery};
}

function calcGananciaTotal(ventasList){
  return ventasList.reduce(function(sum,o){return sum+getCostoReal(o).ganancia;},0);
}

function calcVentasPorCantidad(ventasList){
  var byCant={};
  ventasList.filter(function(o){return o.estado!=='anulado';}).forEach(function(o){
    var q=o.totalCantidad||1;
    byCant[q]=(byCant[q]||0)+1;
  });
  return byCant;
}

function buildChartData(orderList, start, end){
  var days={};
  var cur=new Date(start), endD=new Date(end);
  while(cur<=endD){
    var key=cur.getFullYear()+'-'+String(cur.getMonth()+1).padStart(2,'0')+'-'+String(cur.getDate()).padStart(2,'0');
    days[key]={val:0,count:0};
    cur.setDate(cur.getDate()+1);
  }
  orderList.filter(function(o){return o.estado!=='anulado'&&o.fv>=start&&o.fv<=end;}).forEach(function(o){
    var d=new Date(o.fv);
    var key=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    if(days[key]!==undefined){days[key].val+=(o.cobrar||0);days[key].count++;}
  });
  return Object.entries(days).map(function(e){return{date:e[0],val:e[1].val,count:e[1].count};});
}

function renderLineChart(data, data2){
  if(!data||data.length<2) return '<div style="height:150px;display:flex;align-items:center;justify-content:center;color:var(--tx3);font-size:13px">Sin datos para graficar</div>';
  var W=320, H=150, padL=12, padR=12, padT=26, padB=28;
  var vals=data.map(function(d){return d.val;});
  var maxV=Math.max.apply(null,vals.concat(data2?data2.map(function(d){return d.val;}):[])) || 1;
  var xScale=function(i){return padL+(W-padL-padR)*(data.length===1?0.5:i/(data.length-1));};
  var yScale=function(v){return padT+(H-padT-padB)*(1-v/maxV);};
  var path=data.map(function(d,i){return (i===0?'M':'L')+xScale(i).toFixed(1)+','+yScale(d.val).toFixed(1);}).join(' ');
  var areaPath=path+' L'+xScale(data.length-1).toFixed(1)+','+(H-padB)+' L'+xScale(0).toFixed(1)+','+(H-padB)+' Z';
  // Date labels on x-axis
  var labels='';
  var step=Math.max(1,Math.floor(data.length/5));
  data.forEach(function(d,i){
    if(i%step===0||i===data.length-1){
      var parts=d.date.split('-');
      labels+='<text x="'+xScale(i).toFixed(1)+'" y="'+(H-8)+'" text-anchor="middle" font-size="9" fill="#aaa">'+parts[2]+'/'+parts[1]+'</text>';
    }
  });
  // Previous period line
  var path2='';
  if(data2&&data2.length===data.length){
    path2='<path d="'+data2.map(function(d,i){return (i===0?'M':'L')+xScale(i).toFixed(1)+','+yScale(d.val).toFixed(1);}).join(' ')+'" fill="none" stroke="#93c5fd" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7"/>';
    // Nodes for prev period
    path2+=data2.map(function(d,i){
      return d.val>0?'<circle cx="'+xScale(i).toFixed(1)+'" cy="'+yScale(d.val).toFixed(1)+'" r="2.5" fill="#93c5fd" opacity="0.7"/>':'';
    }).join('');
  }
  // Nodes with count labels for current period
  var nodes=data.map(function(d,i){
    if(d.val===0)return '';
    var cx=xScale(i).toFixed(1), cy=yScale(d.val).toFixed(1);
    var showLabel=(d.count>0); // show count badge on node
    var countBadge=showLabel?'<text x="'+cx+'" y="'+(parseFloat(cy)-8)+'" text-anchor="middle" font-size="9" font-weight="700" fill="#2d7a4f">'+d.count+'</text>':'';
    return '<circle cx="'+cx+'" cy="'+cy+'" r="4" fill="#fff" stroke="#2d7a4f" stroke-width="2"/>'+
           countBadge;
  }).join('');
  return '<svg class="chart-svg" viewBox="0 0 '+W+' '+H+'" style="height:150px;width:100%">'+
    '<defs>'+
    '<linearGradient id="agrad" x1="0" y1="0" x2="0" y2="1">'+
      '<stop offset="0%" stop-color="#2d7a4f" stop-opacity="0.15"/>'+
      '<stop offset="100%" stop-color="#2d7a4f" stop-opacity="0"/>'+
    '</linearGradient>'+
    '</defs>'+
    '<path d="'+areaPath+'" fill="url(#agrad)"/>'+
    path2+
    '<path d="'+path+'" fill="none" stroke="#2d7a4f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>'+
    nodes+
    '<g>'+labels+'</g>'+
  '</svg>';
}


// ═══ ROLE HELPERS ═══════════════════════════════════════════
const isSuper=()=>cu?.role==='superuser';

// ═══ LISTENERS ══════════════════════════════════════════════
function startListeners(){
  listeners.forEach(u=>u());listeners=[];
  let q=db.collection('orders');
  if(!isAdmin())q=q.where('vendedorId','==',cu.id);
  const u=q.onSnapshot(snap=>{
    orders=snap.docs.map(d=>{
      const dat=d.data();
      const regTs=dat.timestamp?.toMillis()||Date.now();
      let fv=regTs;
      if(dat.fechaVenta){
        const parts=dat.fechaVenta.split('-');
        if(parts.length===3)fv=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]),12,0,0).getTime();
      } else if(dat.fechaMs&&dat.fechaMs>0){fv=dat.fechaMs;}
      return{id:d.id,...dat,ts:regTs,fv:fv};
    });
    renderCurrentModule();
    // Reload vendor list whenever orders update
  });
  listeners.push(u);
}

function renderCurrentModule(){
  if(curModule==='dashboard')renderDashboard();
  else if(curModule==='ventas')renderVentas();

// ═══ NAVIGATION ═════════════════════════════════════════════

  curModule=mod;
  ['dashboard','ventas','resumen','config'].forEach(m=>{
    const el=$('mod-'+m); if(el)el.style.display=m===mod?'block':'none';

  });
  const titles={dashboard:'Dashboard',ventas:'Ventas',resumen:'Vendedores',config:'Configuración'};

  // Show/hide global filter
  if(mod==='dashboard')renderDashboard();
  else if(mod==='ventas')renderVentas();

  else if(mod==='config')renderConfig();

// ═══ GLOBAL PERIOD FILTER ═══════════════════════════════════
function setGlobalPeriod(p,el){
  gPeriod=p;
  document.querySelectorAll('#global-filter .fbtn').forEach(b=>b.classList.remove('on'));
  if(el)el.classList.add('on');
  $('custom-range').style.display=p==='custom'?'flex':'none';
  if(p!=='custom')renderCurrentModule();
}
function applyCustom(){
  const f=$('gf-from').value, t=$('gf-to').value;
  if(!f||!t){toast('Selecciona fechas');return;}
  gCustomFrom=new Date(f+'T00:00:00').getTime();
  gCustomTo=new Date(t+'T23:59:59').getTime();
  renderCurrentModule();
}
function getGlobalRange(){
  const n=new Date(),Y=n.getFullYear(),M=n.getMonth(),D=n.getDate();
  if(gPeriod==='today')    return{start:dayStart(Y,M,D),end:dayEnd(Y,M,D),prev:{start:dayStart(Y,M,D-1),end:dayEnd(Y,M,D-1)}};
  if(gPeriod==='yesterday')return{start:dayStart(Y,M,D-1),end:dayEnd(Y,M,D-1),prev:{start:dayStart(Y,M,D-2),end:dayEnd(Y,M,D-2)}};
  if(gPeriod==='week')     return{start:weekStart(),end:dayEnd(Y,M,D),prev:{start:weekStart()-7*86400000,end:weekStart()-1}};
  if(gPeriod==='15days')   return{start:dayStart(Y,M,D-15),end:dayEnd(Y,M,D),prev:{start:dayStart(Y,M,D-30),end:dayStart(Y,M,D-15)-1}};
  if(gPeriod==='month')    return{start:dayStart(Y,M,1),end:dayEnd(Y,M,D),prev:{start:dayStart(Y,M-1,1),end:dayStart(Y,M,1)-1}};
  if(gPeriod==='custom')   return{start:gCustomFrom,end:gCustomTo,prev:{start:0,end:0}};
  return{start:dayStart(Y,M,D),end:dayEnd(Y,M,D),prev:{start:dayStart(Y,M,D-1),end:dayEnd(Y,M,D-1)}};
}

// ═══ DASHBOARD ══════════════════════════════════════════════
function renderDashboard(){
  const {start,end,prev}=getGlobalRange();
  const cur=orders.filter(o=>o.fv>=start&&o.fv<=end);
  const prevOrds=prev.start?orders.filter(o=>o.fv>=prev.start&&o.fv<=prev.end):[];
  const valid=cur.filter(o=>o.estado!=='anulado');
  const prevValid=prevOrds.filter(o=>o.estado!=='anulado');
  const totalS=valid.reduce((s,o)=>s+(o.cobrar||0),0);
  const prevS=prevValid.reduce((s,o)=>s+(o.cobrar||0),0);
  const totalU=valid.reduce((s,o)=>s+(o.totalCantidad||1),0);
  const gan=isSuper()?calcGananciaTotal(cur):null;
  const dPct=(a,b)=>b>0?Math.round((a-b)/b*100):null;
  function dHtml(d){if(d===null)return'';const c=d>=0?'up':'dn';return`<div class="kpi-delta ${c}">${d>=0?'↑':'↓'} ${Math.abs(d)}% vs anterior</div>`;}
  $('kpi-row').innerHTML=
    `<div class="kpi"><div class="kpi-lbl">Ingresos</div><div class="kpi-val g">${fmtC0(totalS)}</div>${dHtml(dPct(totalS,prevS))}</div>`+
    `<div class="kpi"><div class="kpi-lbl">Pedidos</div><div class="kpi-val">${valid.length}</div>${dHtml(dPct(valid.length,prevValid.length))}</div>`+
    `<div class="kpi"><div class="kpi-lbl">Unidades</div><div class="kpi-val">${totalU}</div></div>`+
    (isSuper()?`<div class="kpi"><div class="kpi-lbl">Ganancia real</div><div class="kpi-val g">${fmtC0(gan)}</div></div>`:
    `<div class="kpi"><div class="kpi-lbl">Entregados</div><div class="kpi-val">${cur.filter(o=>o.estado==='entregado').length}</div></div>`);
  // Chart
  const chartCur=buildChartData(orders,start,end);
  const chartPrev=prev.start&&prev.end?buildChartData(orders,prev.start,prev.end):null;
  $('dash-chart').innerHTML=renderLineChart(chartCur,chartPrev&&chartPrev.length===chartCur.length?chartPrev:null);
  // Zone bars
  const lima=valid.filter(o=>o.zona==='Lima').length;
  const prov=valid.filter(o=>o.zona==='Provincia').length;
  const mx=Math.max(lima,prov)||1;
  $('zona-bars').innerHTML=
    `<div class="zone-row"><div class="zdot" style="background:var(--accent)"></div><div class="zname">Lima</div><div class="zwrap"><div class="zbar" style="width:${Math.round(lima/mx*100)}%;background:var(--accent)"></div></div><div class="zcount" style="color:var(--accent)">${lima}</div></div>`+
    `<div class="zone-row"><div class="zdot" style="background:#93c5fd"></div><div class="zname">Provincia</div><div class="zwrap"><div class="zbar" style="width:${Math.round(prov/mx*100)}%;background:#93c5fd"></div></div><div class="zcount" style="color:#1e40af">${prov}</div></div>`;
  // Estado resumen
  const byS={pendiente:0,enviado:0,entregado:0,anulado:0};
  cur.forEach(o=>{if(byS[o.estado]!==undefined)byS[o.estado]++;});
  $('estado-resumen').innerHTML=
    `<div class="dr"><span style="font-size:12px;color:var(--tx2)">✅ Entregado</span><span style="font-weight:700;color:#166534">${byS.entregado}</span></div>`+
    `<div class="dr"><span style="font-size:12px;color:var(--tx2)">📦 Enviado</span><span style="font-weight:700;color:#1e40af">${byS.enviado}</span></div>`+
    `<div class="dr"><span style="font-size:12px;color:var(--tx2)">⏳ Pendiente</span><span style="font-weight:700;color:#92400e">${byS.pendiente}</span></div>`+
    `<div class="dr"><span style="font-size:12px;color:var(--tx2)">✗ Anulado</span><span style="font-weight:700;color:#991b1b">${byS.anulado}</span></div>`;
}

function renderVentas(){

  buildVentasVendorSelect();

$('btn-vf-save').onclick=async function(){
  const err=$('vf-err'); err.style.display='none';
  const cliente=($('vf-cliente').value||'').trim();
  const celular=($('vf-celular').value||'').trim();
  const cobrar=parseFloat($('vf-cobrar').value)||0;
  const producto=$('vf-producto').value;
  const zona=$('vf-zona').value||'Lima';
  const ciudad=($('vf-ciudad').value||'').trim();
  const fechaVenta=$('vf-fecha').value||new Date().toISOString().split('T')[0];
  const cantidad=parseInt($('vf-cantidad').value)||1;
  if(!cliente||!celular||!cobrar){err.textContent='Completa cliente, celular y monto.';err.style.display='block';return;}
  const parts=fechaVenta.split('-');
  const fechaMs=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]),12,0,0).getTime();
  const btn=$('btn-vf-save'); btn.disabled=true; btn.textContent='Guardando...';
  try{
    const data={cliente,celular,cobrar,producto,zona,ciudad,fechaVenta,fechaMs,
      totalCantidad:cantidad,estado:vfStatus,
      productos:[{nombre:producto,cantidad}]};
    if(editOrderId){
      await db.collection('orders').doc(editOrderId).update(data);
      toast('✓ Venta actualizada');
    } else {
      await db.collection('orders').add({...data,
        vendedorId:cu.id,vendedor:cu.name||cu.email,
        timestamp:firebase.firestore.FieldValue.serverTimestamp()});
      toast('✓ Venta registrada');
    }
    closeModal('ov-venta-form');
  }catch(e){err.textContent='Error: '+e.message;err.style.display='block';}
  finally{btn.disabled=false;btn.textContent='Guardar venta';}
};

async function deleteOrder(id){
  if(!confirm('¿Eliminar esta venta permanentemente?\nEsta acción no se puede deshacer.'))return;
  try{await db.collection('orders').doc(id).delete();toast('✓ Venta eliminada');}
  catch(e){toast('Error: '+e.message);}
}

function renderMeta(){
  const {start,end}=getMetaRange();
  const myAll=orders.filter(o=>o.vendedorId===cu.id);
  const myCur=myAll.filter(o=>o.fv>=start&&o.fv<=end);
  const valid=myCur.filter(o=>o.estado!=='anulado');
  const totalS=valid.reduce((s,o)=>s+(o.cobrar||0),0);
  const totalU=valid.reduce((s,o)=>s+(o.totalCantidad||1),0);
  const sueldo=calcSueldo(valid.length);
  const next=getNextLevel(valid.length);
  const maxTick=salaryScale[salaryScale.length-1]?.ventas||30;
  const ticks=[0,...salaryScale.map(l=>l.ventas)];
  let pct=0;
  if(valid.length>=maxTick){pct=100;}
  else{for(let i=1;i<ticks.length;i++){if(valid.length<=ticks[i]){const sS=ticks[i-1],sE=ticks[i];pct=(i-1)/(ticks.length-1)*100+((valid.length-sS)/(sE-sS))/(ticks.length-1)*100;break;}}}
  const byCant=calcVentasPorCantidad(myCur);
  const unitRows=Object.entries(byCant).sort((a,b)=>Number(a[0])-Number(b[0])).map(([k,v])=>
    `<div class="dr"><span style="font-size:13px;color:var(--tx2)">${v} venta${v!==1?'s':''} de ${k} unidad${k!=='1'?'es':''}</span><span style="font-weight:700;color:var(--accent)">${v*parseInt(k)} un.</span></div>`
  ).join('');
  $('meta-content').innerHTML=
    `<div style="display:grid;grid-template-columns:3fr 2fr;gap:16px;align-items:start">
      <div>
        <div class="kpi-row" style="grid-template-columns:repeat(3,1fr);margin-bottom:16px">
          <div class="kpi"><div class="kpi-lbl">Ingresos</div><div class="kpi-val g">${fmtC0(totalS)}</div></div>
          <div class="kpi"><div class="kpi-lbl">Pedidos</div><div class="kpi-val">${valid.length}</div></div>
          <div class="kpi"><div class="kpi-lbl">Unidades</div><div class="kpi-val">${totalU}</div></div>
        </div>
        <div class="chart-wrap">
          <div class="chart-title">Evolución de ingresos</div>
          ${renderLineChart(buildChartData(myAll,start,end),null)}
        </div>
        ${unitRows?`<div class="card" style="margin-top:14px"><div class="card-title">Detalle de unidades</div>${unitRows}</div>`:''}
      </div>
      <div>
        <div class="meta-hero">
          <div style="font-size:11px;font-weight:700;opacity:.7;text-transform:uppercase;letter-spacing:.06em">Período actual</div>
          <div style="font-size:36px;font-weight:800;margin:6px 0 2px">${valid.length} ventas</div>
          <div style="font-size:13px;opacity:.8">${next?`Faltan ${next.ventas-valid.length} para el siguiente nivel 🎯`:'🏆 ¡Nivel máximo!'}</div>
          <div class="meta-prog"><div class="meta-bar" style="width:${pct.toFixed(1)}%"></div></div>
          <div class="meta-ticks"><span>0</span>${salaryScale.map(l=>`<span>${l.ventas}</span>`).join('')}</div>
        </div>
        <div class="card">
          <div class="card-title">Escala semanal</div>
          <div class="meta-levels">
            ${salaryScale.map(l=>{const cur=valid.length>=l.ventas,isNext=next&&l.ventas===next.ventas;
              return`<div class="meta-level${cur&&!isNext?' cur':''}">
                <span style="font-size:13px;font-weight:${cur?'700':'500'};color:${cur?'var(--accent)':'var(--tx2)'}">${l.ventas} ventas${isNext?' ← próximo':cur?' ← actual':''}</span>
                <span style="font-size:14px;font-weight:700;color:${cur?'var(--accent)':'var(--tx2)'}">${fmtC0(l.sueldo)}</span>
              </div>`;}).join('')}
          </div>
          <div style="margin-top:12px;background:var(--accent2);border-radius:9px;padding:12px;display:flex;justify-content:space-between;align-items:center">
            <span style="font-size:12px;color:var(--accent)">Sueldo del período</span>
            <span style="font-size:22px;font-weight:800;color:var(--accent)">${fmtC0(sueldo)}</span>
          </div>
        </div>
      </div>
    </div>`;
}

  let source=isVendedor()?orders.filter(function(o){return o.vendedorId===cu.id;}):orders;
  if(isAdmin()&&histVendedor!=='all')source=source.filter(function(o){return o.vendedor===histVendedor;});
  const inRange=source.filter(function(o){const t=o.fv||o.ts;return t>=start&&t<=end;});
  let filtered=histStatus==='all'?inRange:inRange.filter(function(o){return o.estado===histStatus;});
  filtered.sort(function(a,b){return b.fv-a.fv;});

  // Populate vendor dropdown (admin only)
  populateHistVendors();

  // Stats KPIs
  const valid=inRange.filter(function(o){return o.estado!=='anulado';});
  const totalS=valid.reduce(function(s,o){return s+(o.cobrar||0);},0);
  const byS={pendiente:0,enviado:0,entregado:0,anulado:0};
  inRange.forEach(function(o){if(byS[o.estado]!==undefined)byS[o.estado]++;});
  const statsEl=document.getElementById('hist-stats');
  if(statsEl){
    statsEl.innerHTML=
      '<div class="kpi"><div class="kpi-lbl">Total pedidos</div><div class="kpi-val">'+inRange.length+'</div></div>'+
      '<div class="kpi"><div class="kpi-lbl">Ingresos</div><div class="kpi-val g">'+fmtC0(totalS)+'</div></div>'+
      '<div class="kpi" style="display:grid;grid-template-columns:1fr 1fr;gap:6px;background:var(--bg);border:1px solid var(--bo);border-radius:var(--r);padding:14px 16px">'+
        '<div style="text-align:center"><div style="font-size:16px;font-weight:800;color:#166534">'+byS.entregado+'</div><div style="font-size:10px;color:#166534">Entregado</div></div>'+
        '<div style="text-align:center"><div style="font-size:16px;font-weight:800;color:#1e40af">'+byS.enviado+'</div><div style="font-size:10px;color:#1e40af">Enviado</div></div>'+
        '<div style="text-align:center"><div style="font-size:16px;font-weight:800;color:#92400e">'+byS.pendiente+'</div><div style="font-size:10px;color:#92400e">Pendiente</div></div>'+
        '<div style="text-align:center"><div style="font-size:16px;font-weight:800;color:#991b1b">'+byS.anulado+'</div><div style="font-size:10px;color:#991b1b">Anulado</div></div>'+
      '</div>';
  }

  // Chart
  const chartEl=document.getElementById('hist-chart');
  if(chartEl)chartEl.innerHTML=renderLineChart(buildChartData(source,start,end),null);

  // Table with pagination
  const totalPg=filtered.length, pages=Math.ceil(totalPg/PAGE_SIZE)||1;
  histPage=Math.min(histPage,pages);
  const page=filtered.slice((histPage-1)*PAGE_SIZE,histPage*PAGE_SIZE);
  const tblEl=document.getElementById('hist-tbl-wrap');
  if(!tblEl)return;
  tblEl.innerHTML='<table><thead><tr>'+
    '<th>Fecha</th><th>Cliente</th><th>Celular</th><th>Producto</th>'+
    '<th>Zona</th><th>Cobrar</th>'+(isAdmin()?'<th>Vendedor</th>':'')+
    '<th>Estado</th><th>Acciones</th>'+
  '</tr></thead><tbody>'+
  (page.length?page.map(function(o){
    var waLink=o.celular?'<a href="https://wa.me/51'+(o.celular||'').replace(/\D/g,'')+'" target="_blank" style="display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;background:#25D366;border-radius:50%;text-decoration:none"><svg viewBox="0 0 24 24" width="11" height="11" fill="#fff"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.025.507 3.934 1.399 5.61L0 24l6.545-1.376A11.95 11.95 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.818 9.818 0 01-5.007-1.368l-.36-.214-3.724.783.838-3.63-.234-.374A9.818 9.818 0 012.182 12C2.182 6.578 6.578 2.182 12 2.182S21.818 6.578 21.818 12 17.422 21.818 12 21.818z"/></svg></a>':'';
    return '<tr>'+
      '<td style="font-size:12px;color:var(--tx2)">'+(o.fechaVenta||'—')+'</td>'+
      '<td style="font-weight:600">'+(o.cliente||'—')+'</td>'+
      '<td><div style="display:flex;align-items:center;gap:6px"><span style="font-size:12px">'+(o.celular||'—')+'</span>'+waLink+'</div></td>'+
      '<td style="font-size:12px">'+(o.producto||'—')+(o.totalCantidad>1?' ×'+o.totalCantidad:'')+'</td>'+
      '<td style="font-size:12px">'+(o.zona||'—')+'</td>'+
      '<td style="font-weight:700;color:var(--accent)">'+fmtC(o.cobrar||0)+'</td>'+
      (isAdmin()?'<td style="font-size:12px;color:var(--accent);font-weight:600">'+(o.vendedor||'—')+'</td>':'')+
      '<td><span class="badge '+(o.estado||'pendiente')+'">'+statusLabel(o.estado||'pendiente')+'</span></td>'+
      '<td><div class="tbl-actions">'+
        '<button class="act-btn view" onclick="openDetalle(this.dataset.id)" data-id="'+o.id+'">Ver</button>'+
        '<button class="act-btn edit" onclick="openEditVenta(this.dataset.id)" data-id="'+o.id+'">Editar</button>'+
        (isSuper()?'<button class="act-btn del" onclick="deleteOrder(this.dataset.id)" data-id="'+o.id+'">Eliminar</button>':'')+
      '</div></td>'+
    '</tr>';
  }).join(''):'<tr><td colspan="9"><div class="empty">Sin ventas en este período</div></td></tr>')+
  '</tbody></table>'+
  '<div class="pagination">'+
    '<button class="pg-btn" onclick="histPage--;renderHistorial()" '+(histPage<=1?'disabled':'')+'>← Anterior</button>'+
    '<span class="pg-info">Página '+histPage+' de '+pages+' · '+totalPg+' ventas</span>'+
    '<button class="pg-btn" onclick="histPage++;renderHistorial()" '+(histPage>=pages?'disabled':'')+'>Siguiente →</button>'+
  '</div>';
}

window._vData={};

function renderResumen(){
  const {start,end}=getGlobalRange();
  const all=orders.filter(o=>{const t=o.fv||o.fechaMs||o.ts;return t>=start&&t<=end;});
  const valid=all.filter(o=>o.estado!=='anulado');
  const totalS=valid.reduce((s,o)=>s+(o.cobrar||0),0);
  const gan=isSuper()?calcGananciaTotal(all):0;
  const vendMap={};
  all.forEach(o=>{
    const name=o.vendedor||'Desconocido';
    if(!vendMap[name])vendMap[name]={ventas:0,cobrado:0,ganancia:0,productos:{},estados:{pendiente:0,enviado:0,entregado:0,anulado:0},allOrders:[]};
    vendMap[name].ventas++;vendMap[name].cobrado+=(o.cobrar||0);
    vendMap[name].allOrders.push(o);
    if(vendMap[name].estados[o.estado]!==undefined)vendMap[name].estados[o.estado]++;
    if(o.estado!=='anulado'){
      const qty=o.totalCantidad||1;
      if(o.productos?.length){o.productos.forEach(p=>{vendMap[name].productos[p.nombre]=(vendMap[name].productos[p.nombre]||0)+(p.cantidad||1);});}
      else if(o.producto){vendMap[name].productos[o.producto]=(vendMap[name].productos[o.producto]||0)+qty;}
    }
    if(isSuper())vendMap[name].ganancia+=getCostoReal(o).ganancia;
  });
  const totalPedidos=valid.length;
  let hh=`<div class="kpi-row" style="margin-bottom:16px">
    <div class="kpi"><div class="kpi-lbl">Ingresos</div><div class="kpi-val g">${fmtC0(totalS)}</div></div>
    <div class="kpi"><div class="kpi-lbl">Pedidos</div><div class="kpi-val">${totalPedidos}</div></div>
    ${isSuper()?`<div class="kpi"><div class="kpi-lbl">Ganancia real</div><div class="kpi-val g">${fmtC0(gan)}</div></div>`:''}
  </div>`;
  const entries=Object.entries(vendMap).sort((a,b)=>b[1].ventas-a[1].ventas);
  entries.forEach((entry,vi)=>{
    const name=entry[0],d=entry[1];
    const vid='vp-'+vi;
    const ventasV=d.allOrders.filter(o=>o.estado!=='anulado').length;
    const sueldo=calcSueldo(ventasV);
    const next=getNextLevel(ventasV);
    const byCant=calcVentasPorCantidad(d.allOrders);
    const cantRows=Object.entries(byCant).sort((a,b)=>Number(a[0])-Number(b[0])).map(([k,v])=>
      `<div class="dr"><span style="font-size:13px">${v} venta${v!==1?'s':''} de ${k} unidad${k!=='1'?'es':''}</span><span style="font-weight:700;color:var(--accent)">${v*parseInt(k)} un.</span></div>`
    ).join('');
    const prodRows=Object.entries(d.productos).sort((a,b)=>b[1]-a[1]).map(([n,qty])=>
      `<div class="dr"><span style="font-size:13px">${n}</span><span style="font-weight:700;color:var(--accent)">${qty} un.</span></div>`
    ).join('');
    window._vData[vid]={estados:d.estados,cantRows,prodRows,sueldo,ventasValidas:ventasV,ganancia:d.ganancia,showGan:isSuper()};
    hh+=`<div class="vcard">
      <div class="vcard-hdr" data-vid="${vid}" onclick="toggleVP(this.dataset.vid)">
        <div>
          <div class="vcard-name">${name}</div>
          <div class="vcard-sub">${d.ventas} ventas · ${fmtC0(d.cobrado)} cobrado${isSuper()?' · Gan: '+fmtC0(d.ganancia):''}</div>
        </div>
        <div style="display:flex;align-items:center;gap:12px">
          <span style="font-size:12px;font-weight:600;padding:4px 10px;border-radius:20px;background:${next?'#fef3c7':'#dcfce7'};color:${next?'#92400e':'#166534'}">${next?'🎯 −'+(next.ventas-ventasV):'✅ Meta'}</span>
          <span id="${vid}-arrow" style="font-size:14px;color:var(--tx3);transition:transform .2s">▶</span>
        </div>
      </div>
      <div class="vcard-body" id="${vid}"></div>
    </div>`;
  });
  if(!entries.length)hh+='<div class="empty">Sin ventas en este período</div>';
  $('resumen-content').innerHTML=hh;
}

function toggleVP(vid){
  const body=document.getElementById(vid);
  const arrow=document.getElementById(vid+'-arrow');
  if(!body)return;
  const isOpen=body.style.display!=='none'&&body.innerHTML!=='';
  if(!isOpen){
    const d=(window._vData||{})[vid];
    if(d&&!body._rendered){
      body.style.display='block';
      body.innerHTML=`<div class="vcard-sep"></div>
        <div class="estado-grid">
          <div class="estado-chip" style="background:#dcfce7"><div class="n" style="color:#166534">${d.estados.entregado}</div><div class="l" style="color:#166534">Entregado</div></div>
          <div class="estado-chip" style="background:#dbeafe"><div class="n" style="color:#1e40af">${d.estados.enviado}</div><div class="l" style="color:#1e40af">Enviado</div></div>
          <div class="estado-chip" style="background:#fef3c7"><div class="n" style="color:#92400e">${d.estados.pendiente}</div><div class="l" style="color:#92400e">Pendiente</div></div>
          <div class="estado-chip" style="background:#fee2e2"><div class="n" style="color:#991b1b">${d.estados.anulado}</div><div class="l" style="color:#991b1b">Anulado</div></div>
        </div>
        ${d.cantRows?`<div class="section-lbl">Ventas por cantidad</div><div style="background:var(--bg2);border-radius:9px;padding:4px 10px;margin-bottom:12px">${d.cantRows}</div>`:''}
        ${d.prodRows?`<div class="section-lbl">Productos vendidos</div><div style="background:var(--bg2);border-radius:9px;padding:4px 10px;margin-bottom:12px">${d.prodRows}</div>`:''}
        <div class="fin-row">
          <div class="fin-box" style="background:var(--accent2)"><div class="l" style="color:var(--accent)">SUELDO PERÍODO</div><div class="n" style="color:var(--accent)">S/ ${d.sueldo}</div><div style="font-size:11px;color:var(--tx3);margin-top:2px">${d.ventasValidas} ventas válidas</div></div>
          ${d.showGan?`<div class="fin-box" style="background:#f0fdf4"><div class="l" style="color:#166534">GANANCIA REAL</div><div class="n" style="color:#166534">${fmtC0(d.ganancia)}</div></div>`:''}
        </div>`;
      body._rendered=true;
    } else {
      body.style.display='block';
    }
    if(arrow){arrow.style.transform='rotate(90deg)';arrow.style.color='var(--accent)';}
  } else {
    body.style.display='none';
    body._rendered=false;
    if(arrow){arrow.style.transform='';arrow.style.color='var(--tx3)';}
  }
}

// ═══ CONFIG ══════════════════════════════════════════════════
function renderConfig(){
  if(!isSuper()){$('config-content').innerHTML='<div class="empty">Solo disponible para Super Admin</div>';return;}
  $('config-content').innerHTML=`
    <div class="grid-2">
      <div>
        <div class="card" style="margin-bottom:14px">
          <div class="card-title">Productos y precios</div>
          <div id="cfg-prods"></div>
          <button onclick="openAddProd()" style="margin-top:10px;padding:8px 16px;background:var(--accent2);color:var(--accent);border:1px dashed var(--accent);border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;width:100%">+ Agregar producto</button>
        </div>
        <div class="card">
          <div class="card-title">Costos de delivery</div>
          <div class="fld-row" style="margin-bottom:10px">
            <div class="fld"><label>Lima (S/)</label><input type="number" id="cost-lima" value="${cfg.deliveryCostos?.Lima||0}" step="0.5"></div>
            <div class="fld"><label>Provincia (S/)</label><input type="number" id="cost-prov" value="${cfg.deliveryCostos?.Provincia||0}" step="0.5"></div>
          </div>
          <button onclick="saveDelivery()" class="btn-primary" style="padding:9px">Guardar costos</button>
        </div>
      </div>
      <div class="card">
        <div class="card-title">Escala de sueldos · Semanal</div>
        <div id="cfg-scale"></div>
        <div style="display:flex;gap:8px;margin-top:10px">
          <button onclick="addScaleRowCfg()" style="flex:1;padding:9px;background:var(--accent2);color:var(--accent);border:1px dashed var(--accent);border-radius:8px;font-size:13px;font-weight:600;cursor:pointer">+ Nivel</button>
          <button onclick="saveScaleCfg()" class="btn-primary" style="flex:1;padding:9px">Guardar</button>
        </div>
      </div>
    </div>`;
  renderCfgProds();renderCfgScale();
}

function renderCfgProds(){
  const el=document.getElementById('cfg-prods'); if(!el)return;
  el.innerHTML=(cfg.productos||[]).map((p,i)=>`
    <div style="border-bottom:0.5px solid var(--bo);padding:10px 0">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
        <div style="font-size:13px;font-weight:700">${p.nombre}</div>
        <button onclick="delProd(${i})" style="background:none;border:none;color:var(--tx3);cursor:pointer;font-size:14px">✕</button>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <span style="font-size:11px;color:var(--tx3)">Costo S/</span>
        <input type="number" value="${p.costo||0}" step="0.5" style="width:70px;padding:5px 8px;border:1px solid var(--bo2);border-radius:7px;background:var(--bg2);font-size:13px;font-family:inherit" onchange="updateProdField(${i},'costo',this.value)">
        ${[1,2,3,4,5,6].map(n=>`<span style="font-size:11px;padding:3px 8px;background:var(--accent2);color:var(--accent);border-radius:5px;font-weight:600">×${n}: S/${(p.preciosPorCantidad||{})[n]||'—'}</span>`).join('')}
      </div>
    </div>`).join('')||'<div style="color:var(--tx3);font-size:13px;padding:8px 0">Sin productos</div>';
}

function renderCfgScale(){
  const el=document.getElementById('cfg-scale'); if(!el)return;
  el.innerHTML=''; el.style.cssText='display:flex;flex-direction:column;gap:0;overflow:hidden';
  salaryScale.forEach((l,i)=>{
    const row=document.createElement('div');
    row.style.cssText='display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:0.5px solid var(--bo)';
    const inpS='box-sizing:border-box;padding:7px 8px;border:1px solid var(--bo2);border-radius:8px;background:var(--bg2);font-size:13px;font-family:inherit;outline:none';
    row.innerHTML=`<input type="number" min="1" value="${l.ventas}" id="sv-${i}" style="${inpS};width:60px;text-align:center;flex-shrink:0"><span style="font-size:12px;color:var(--tx3);white-space:nowrap">vtas = S/</span><input type="number" min="0" value="${l.sueldo}" id="ss-${i}" style="${inpS};flex:1;color:var(--accent);font-weight:700"><button onclick="removeScaleRowCfg(${i})" style="flex-shrink:0;width:30px;height:30px;border:none;background:#fee2e2;color:#991b1b;border-radius:7px;cursor:pointer;font-size:13px">✕</button>`;
    el.appendChild(row);
  });
}

function addScaleRowCfg(){salaryScale.push({ventas:0,sueldo:0});renderCfgScale();}
function removeScaleRowCfg(i){salaryScale.splice(i,1);renderCfgScale();}
async function saveScaleCfg(){
  const newScale=salaryScale.map((_,i)=>({ventas:parseInt(document.getElementById('sv-'+i)?.value)||0,sueldo:parseInt(document.getElementById('ss-'+i)?.value)||0})).filter(l=>l.ventas>0&&l.sueldo>0).sort((a,b)=>a.ventas-b.ventas);
  if(!newScale.length){toast('Agrega al menos un nivel');return;}
  await db.collection('config').doc('ventas').set({salaryScale:newScale},{merge:true});
  salaryScale=newScale;cfg.salaryScale=newScale;toast('✓ Escala guardada');
}

async function updateProdField(i,field,val){
  if(!cfg.productos[i])return;
  cfg.productos[i][field]=parseFloat(val)||0;
  await db.collection('config').doc('ventas').set({productos:cfg.productos},{merge:true});
  toast('✓ Guardado');
}
async function delProd(i){
  if(!confirm('¿Eliminar este producto?'))return;
  cfg.productos.splice(i,1);
  await db.collection('config').doc('ventas').set({productos:cfg.productos},{merge:true});
  renderCfgProds();toast('✓ Eliminado');
}
function openAddProd(){toast('Usa la app móvil para agregar productos con precios por cantidad');}

async function saveDelivery(){
  const Lima=parseFloat(document.getElementById('cost-lima')?.value)||0;
  const Provincia=parseFloat(document.getElementById('cost-prov')?.value)||0;
  await db.collection('config').doc('ventas').set({deliveryCostos:{Lima,Provincia}},{merge:true});
  cfg.deliveryCostos={Lima,Provincia};
  toast(`✓ Lima S/${Lima} · Provincia S/${Provincia} guardados`);
}

// ═══ MODALS ══════════════════════════════════════════════════
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-ov').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));

// ═══ TOAST ═══════════════════════════════════════════════════
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}


// ── Historial PC filter handlers ─────────────────────────────────────────

function pcSetVend(val){
  pcHistVendedor=val;
  pcHistPage=1;
  renderMeta();
}

function pcSetPeriod(val){
  pcHistPeriod=val;
  var cr=document.getElementById('pc-custom-range');
  if(cr)cr.style.display=val==='custom'?'flex':'none';
  pcHistPage=1;
  if(val!=='custom')renderMeta();
}

function pcSetStatus(val){
  pcHistStatus=val;
  pcHistPage=1;
  renderMeta();
}

function pcApplyCustom(){
  var f=(document.getElementById('pc-from')||{}).value;
  var t=(document.getElementById('pc-to')||{}).value;
  if(!f||!t){toast('Selecciona fechas inicio y fin');return;}
  pcHistCustomFrom=new Date(f+'T00:00:00').getTime();
  pcHistCustomTo=new Date(t+'T23:59:59').getTime();
  pcHistPage=1;
  renderMeta();
}

// Legacy compat wrappers (keep in case called from old code)
function setPCHistPeriodSel(sel){pcSetPeriod(sel.value);}
function setPCHistVendSel(sel){pcSetVend(sel.value);}
function setPCHistStatus(s){pcSetStatus(s);}
function applyPCHistCustom(){pcApplyCustom();}
function pcBuildVendorSelect(){}  // no longer needed, built in renderMeta
