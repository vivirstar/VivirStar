<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>NotaVenta Pro</title>
<meta name="theme-color" content="#18181b">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NotaVenta">
<link rel="manifest" href="nota-venta-manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --font:'DM Sans',sans-serif;
  --mono:'DM Mono',monospace;
  --bg:#f9f8f6;--bg2:#fff;--bg3:#f2f0ec;
  --tx:#18181b;--tx2:#71717a;--tx3:#a1a1aa;
  --bo:rgba(0,0,0,0.07);--bo2:rgba(0,0,0,0.12);
  --r:10px;--r2:16px;
  --sid:232px;--hdr:54px;
}
body{font-family:var(--font);background:var(--bg);color:var(--tx);min-height:100vh;display:flex}

/* ── SIDEBAR ─────────── */
.sidebar{width:var(--sid);background:var(--bg2);border-right:1px solid var(--bo);
  display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:50;
  transition:transform .25s}
.sb-header{padding:18px 16px 14px;border-bottom:1px solid var(--bo)}
.sb-app{display:flex;align-items:center;gap:10px}
.sb-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;font-weight:600;color:#fff}
.sb-nm{font-size:14px;font-weight:600;color:var(--tx)}
.sb-sub{font-size:11px;color:var(--tx3);margin-top:1px}
.sb-store-sel{margin:10px 16px 0;padding:8px 10px;border:1px solid var(--bo2);border-radius:8px;
  background:var(--bg3);font-family:var(--font);font-size:12px;color:var(--tx);
  cursor:pointer;outline:none;width:calc(100% - 32px)}
.sb-store-sel:focus{border-color:var(--store-accent,#2d7a4f)}
.nav-sec{padding:8px 0;flex:1;overflow-y:auto}
.nav-lbl{font-size:9px;font-weight:600;color:var(--tx3);letter-spacing:.1em;text-transform:uppercase;padding:8px 16px 4px}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 16px;font-size:13px;
  color:var(--tx2);cursor:pointer;border:none;background:none;width:100%;
  text-align:left;transition:all .12s;border-radius:0}
.nav-item:hover{background:var(--bg3);color:var(--tx)}
.nav-item.on{background:color-mix(in srgb,var(--store-accent,#2d7a4f) 10%,transparent);
  color:var(--store-accent,#2d7a4f);font-weight:500}
.nav-item.on .nav-dot{background:var(--store-accent,#2d7a4f)}
.nav-dot{width:4px;height:4px;border-radius:50%;background:transparent;transition:.12s;flex-shrink:0}
.nav-item svg{width:15px;height:15px;stroke:currentColor;stroke-width:1.7;fill:none;flex-shrink:0}
.sb-foot{padding:12px 16px;border-top:1px solid var(--bo)}
.user-row{display:flex;align-items:center;gap:8px}
.user-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:600;color:#fff;flex-shrink:0}
.user-nm{font-size:12px;font-weight:500;color:var(--tx)}
.user-rl{font-size:10px;color:var(--tx3)}
.btn-out{margin-left:auto;padding:4px 9px;border:1px solid var(--bo2);border-radius:6px;
  background:none;font-family:var(--font);font-size:11px;color:var(--tx2);cursor:pointer}

/* ── MAIN ────────────── */
.main{margin-left:var(--sid);flex:1;display:flex;flex-direction:column;min-height:100vh}
.hdr{height:var(--hdr);background:var(--bg2);border-bottom:1px solid var(--bo);
  display:flex;align-items:center;padding:0 24px;gap:14px;position:sticky;top:0;z-index:40}
.hdr-title{font-size:15px;font-weight:600;color:var(--tx)}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.content{padding:24px;flex:1}

/* ── KPI CARDS ────────── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.kpi{background:var(--bg2);border-radius:var(--r);padding:14px 16px;border:1px solid var(--bo)}
.kpi-lbl{font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.kpi-val{font-size:24px;font-weight:500;color:var(--tx)}
.kpi-val.accent{color:var(--store-accent,#2d7a4f)}
.kpi-sub{font-size:11px;color:var(--tx3);margin-top:2px}

/* ── CARD ─────────────── */
.card{background:var(--bg2);border-radius:var(--r2);border:1px solid var(--bo);padding:18px}
.card-title{font-size:11px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}

/* ── FORM ─────────────── */
.fld{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.fld label{font-size:10px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.05em}
.fld input,.fld select,.fld textarea{background:var(--bg3);border:1px solid var(--bo2);
  border-radius:8px;padding:9px 11px;font-size:13px;color:var(--tx);
  font-family:var(--font);outline:none;transition:border-color .15s}
.fld input:focus,.fld select:focus,.fld textarea:focus{
  border-color:var(--store-accent,#2d7a4f);background:var(--bg2)}
.fld-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fld-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.divider{height:1px;background:var(--bo);margin:14px 0}

/* ── BUTTONS ──────────── */
.btn{padding:9px 18px;border-radius:9px;font-family:var(--font);font-size:13px;font-weight:500;
  cursor:pointer;border:none;transition:all .12s}
.btn-primary{background:var(--store-accent,#2d7a4f);color:#fff}
.btn-primary:hover{filter:brightness(1.08)}
.btn-secondary{background:var(--bg3);color:var(--tx2);border:1px solid var(--bo2)}
.btn-secondary:hover{background:var(--bo)}
.btn-danger{background:#fee2e2;color:#991b1b}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:7px}
.btn-w{width:100%}

/* ── TABLE ────────────── */
.tbl-wrap{background:var(--bg2);border-radius:var(--r2);border:1px solid var(--bo);overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:var(--bg3);padding:10px 14px;text-align:left;font-size:10px;
  font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;
  border-bottom:1px solid var(--bo)}
tbody td{padding:11px 14px;border-bottom:0.5px solid var(--bo);color:var(--tx);vertical-align:middle}
tbody tr:last-child td{border:none}
tbody tr:hover{background:var(--bg3)}

/* ── BADGE ────────────── */
.badge{padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600}
.badge-prov{background:#e8f0fb;color:#185fa5}
.badge-lima{background:#faeeda;color:#854f0b}
.badge-ok{background:#dcfce7;color:#166534}
.badge-pen{background:#fef3c7;color:#92400e}

/* ── MODAL ────────────── */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;
  align-items:center;justify-content:center;padding:20px}
.modal-ov.open{display:flex}
.modal{background:var(--bg2);border-radius:var(--r2);width:640px;max-width:95vw;
  max-height:90vh;overflow-y:auto;position:relative}
.modal-hdr{padding:18px 20px 14px;border-bottom:1px solid var(--bo);display:flex;align-items:center;justify-content:space-between}
.modal-hdr h3{font-size:16px;font-weight:600}
.modal-body{padding:20px}
.modal-close{background:none;border:none;font-size:18px;cursor:pointer;color:var(--tx3);
  padding:4px;line-height:1}
.err{background:#fee2e2;border:1px solid #fca5a5;border-radius:8px;padding:9px 12px;
  font-size:12px;color:#991b1b;display:none;margin-top:8px}

/* ── RECEIPT PREVIEW ──── */
.receipt-preview{border-radius:12px;overflow:hidden;border:1px solid var(--bo);
  box-shadow:0 4px 24px rgba(0,0,0,0.06)}
.rp-head{padding:16px;text-align:center;color:#fff}
.rp-logo-area{display:inline-flex;align-items:center;gap:10px;margin-bottom:8px}
.rp-logo{width:36px;height:36px;border-radius:9px;object-fit:cover;background:#fff3}
.rp-logo-txt{width:36px;height:36px;border-radius:9px;background:rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600}
.rp-nm{font-size:13px;font-weight:600}
.rp-sub{font-size:9px;opacity:.5;letter-spacing:.1em;text-transform:uppercase}
.rp-num{font-size:22px;font-weight:500;margin:6px 0 2px}
.rp-date{font-size:10px;opacity:.4}
.rp-body{background:#fff;padding:14px}
.rp-row{display:flex;justify-content:space-between;align-items:center;
  padding:5px 0;border-bottom:0.5px solid #f0f0f0;font-size:11px}
.rp-row:last-of-type{border:none}
.rp-lbl{color:#888}
.rp-val{font-weight:500;color:#18181b}
.rp-total-box{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:9px;padding:10px;margin:8px 0;text-align:center}
.rp-t-lbl{font-size:9px;color:#166534;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.rp-t-val{font-size:20px;font-weight:600;color:#166534;margin:2px 0}
.rp-t-sub{font-size:10px;color:#166534;opacity:.7}
.rp-coupon{border-radius:9px;padding:10px;text-align:center;position:relative;overflow:hidden;margin-top:8px}
.rp-coupon::before,.rp-coupon::after{content:'';position:absolute;width:14px;height:14px;
  border-radius:50%;background:#fff;top:50%;transform:translateY(-50%)}
.rp-coupon::before{left:-7px}
.rp-coupon::after{right:-7px}
.rp-c-lbl{font-size:8px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.1em}
.rp-c-code{font-size:16px;font-weight:500;color:#fff;font-family:var(--mono);letter-spacing:.12em;margin:3px 0}
.rp-c-desc{font-size:9px;color:rgba(255,255,255,.55)}
.rp-footer{font-size:9px;color:#aaa;text-align:center;margin-top:8px;line-height:1.6}

/* ── COLOR PICKER CHIP ── */
.color-chip{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;
  transition:.15s;flex-shrink:0}
.color-chip.on{border-color:var(--tx);transform:scale(1.15)}
.color-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}

/* ── STORE CARD ────────── */
.store-card{background:var(--bg2);border-radius:var(--r2);border:1px solid var(--bo);
  overflow:hidden;transition:box-shadow .15s;cursor:pointer}
.store-card:hover{box-shadow:0 4px 20px rgba(0,0,0,0.08)}
.sc-banner{height:56px;display:flex;align-items:center;justify-content:center;position:relative}
.sc-logo{width:40px;height:40px;border-radius:10px;background:rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;color:#fff;overflow:hidden}
.sc-logo img{width:100%;height:100%;object-fit:cover}
.sc-body{padding:12px}
.sc-nm{font-size:13px;font-weight:600;color:var(--tx)}
.sc-cat{font-size:11px;color:var(--tx3)}
.sc-stats{display:flex;gap:8px;margin-top:8px}
.sc-stat{flex:1;text-align:center;background:var(--bg3);border-radius:7px;padding:5px}
.sc-stat-n{font-size:13px;font-weight:500}
.sc-stat-l{font-size:9px;color:var(--tx3)}

/* ── LAYOUT NOTE ────────── */
.note-layout{display:grid;grid-template-columns:1fr 280px;gap:16px;align-items:start}

/* ── ITEMS TABLE ────────── */
.items-tbl{width:100%;border-collapse:collapse;font-size:12px;margin:8px 0}
.items-tbl th{background:var(--bg3);padding:7px 10px;text-align:left;font-size:10px;
  font-weight:600;color:var(--tx3);text-transform:uppercase}
.items-tbl td{padding:7px 10px;border-bottom:0.5px solid var(--bo)}
.items-tbl td input{width:100%;border:none;background:transparent;font-family:var(--font);
  font-size:12px;color:var(--tx);outline:none}
.items-tbl td input:focus{background:var(--bg3);border-radius:4px;padding:2px 4px}
.items-tbl td.rm-col{width:32px;text-align:center}
.rm-btn{background:none;border:none;color:var(--tx3);cursor:pointer;font-size:14px;padding:2px 6px;border-radius:4px}
.rm-btn:hover{background:#fee2e2;color:#991b1b}
.add-row-btn{padding:7px 12px;background:var(--bg3);border:0.5px dashed var(--bo2);
  border-radius:7px;font-family:var(--font);font-size:11px;color:var(--tx2);cursor:pointer;width:100%;margin-top:4px}

/* ── LOGIN ────────────── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:var(--bg);width:100%}
.login-box{width:380px;background:var(--bg2);border-radius:var(--r2);
  border:1px solid var(--bo);overflow:hidden}
.login-banner{padding:28px 24px 20px;background:#18181b;text-align:center}
.login-logo{width:48px;height:48px;border-radius:12px;background:#2d7a4f;
  display:flex;align-items:center;justify-content:center;margin:0 auto 10px;font-size:20px}
.login-nm{font-size:18px;font-weight:600;color:#fff;margin-bottom:4px}
.login-sub{font-size:12px;color:rgba(255,255,255,.4)}
.login-body{padding:24px}

/* ── TOAST ────────────── */
.toast{position:fixed;bottom:24px;right:24px;background:#18181b;color:#fff;
  padding:12px 20px;border-radius:10px;font-size:13px;z-index:999;
  opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}

/* ── SPIN ─────────────── */
.spin{width:28px;height:28px;border:2.5px solid var(--bo);border-top-color:var(--store-accent,#2d7a4f);
  border-radius:50%;animation:sp .7s linear infinite;margin:32px auto;display:block}
@keyframes sp{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:36px;color:var(--tx3);font-size:13px}

/* ── PAGINATION ────────── */
.pgn{display:flex;align-items:center;gap:8px;padding:12px 14px;
  border-top:1px solid var(--bo);font-size:12px;color:var(--tx2)}
.pgn-btn{padding:5px 10px;border:1px solid var(--bo2);border-radius:6px;
  background:var(--bg);cursor:pointer;font-size:12px;font-family:var(--font)}
.pgn-btn:disabled{opacity:.4;cursor:not-allowed}
.pgn-info{margin:0 auto}

/* ── STORE ICON UPLOAD ── */
.logo-upload-area{border:1.5px dashed var(--bo2);border-radius:10px;padding:16px;
  text-align:center;cursor:pointer;transition:.15s}
.logo-upload-area:hover{border-color:var(--store-accent,#2d7a4f);background:var(--bg3)}
.logo-preview-lg{width:80px;height:80px;border-radius:16px;object-fit:cover;margin:0 auto 8px;display:block}
.logo-placeholder{width:80px;height:80px;border-radius:16px;display:flex;align-items:center;
  justify-content:center;font-size:28px;margin:0 auto 8px;color:#fff;font-weight:600}

/* ── MOBILE ─────────────── */
@media(max-width:768px){
  :root{--sid:0px}
  .sidebar{transform:translateX(-100%);width:240px}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .kpi-grid{grid-template-columns:1fr 1fr}
  .note-layout{grid-template-columns:1fr}
  .fld-row,.fld-row3,.g2,.g3{grid-template-columns:1fr}
  .hdr{padding:0 14px}
  .content{padding:14px;padding-bottom:80px}
  .hdr-burger{display:flex!important}
  #mobile-nav{display:flex!important}
  .nb-admin-only{display:none!important}
}
#mobile-nav button svg{color:var(--tx3)}
#mobile-nav button.mn-on svg,#mobile-nav button.mn-on span{color:var(--store-accent,#2d7a4f)}
.hdr-burger{display:none;align-items:center;justify-content:center;
  width:34px;height:34px;background:var(--bg3);border:1px solid var(--bo);
  border-radius:8px;cursor:pointer;flex-shrink:0}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:49}
.overlay.on{display:block}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="pg-login">
  <div class="login-box">
    <div class="login-banner">
      <div class="login-logo">🧾</div>
      <div class="login-nm">NotaVenta Pro</div>
      <div class="login-sub">Sistema profesional de notas de venta</div>
    </div>
    <div class="login-body">
      <div class="fld"><label>Correo</label><input type="email" id="li-em" placeholder="tu@correo.com" autocomplete="email"></div>
      <div class="fld"><label>Contraseña</label><input type="password" id="li-pw" placeholder="••••••••"></div>
      <div class="err" id="li-err"></div>
      <button class="btn btn-primary btn-w" id="btn-li" style="margin-top:12px">Iniciar sesión</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="pg-app" style="display:none;width:100%">
  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar">
    <div class="sb-header">
      <div class="sb-app">
        <div class="sb-icon" id="sb-store-icon">🧾</div>
        <div>
          <div class="sb-nm" id="sb-store-nm">NotaVenta</div>
          <div class="sb-sub" id="sb-user-rl">Cargando...</div>
        </div>
      </div>
      <select class="sb-store-sel" id="sb-store-sel" onchange="selectStore(this.value)">
        <option value="">Selecciona tienda...</option>
      </select>
    </div>

    <div class="nav-sec">
      <div class="nav-lbl">Principal</div>
      <button class="nav-item on" id="nb-dash" onclick="showMod('dash')">
        <div class="nav-dot"></div>
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Dashboard
      </button>
      <button class="nav-item" id="nb-nueva" onclick="showMod('nueva')">
        <div class="nav-dot"></div>
        <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
        Nueva nota
      </button>
      <button class="nav-item" id="nb-hist" onclick="showMod('hist')">
        <div class="nav-dot"></div>
        <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>
        Historial
      </button>
      <div class="nav-lbl" id="nav-admin-lbl" style="display:none">Admin</div>
      <button class="nav-item" id="nb-tiendas" onclick="showMod('tiendas')" style="display:none">
        <div class="nav-dot"></div>
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Tiendas
      </button>
      <button class="nav-item" id="nb-vendedores" onclick="showMod('vendedores')" style="display:none">
        <div class="nav-dot"></div>
        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        Vendedores
      </button>
      <button class="nav-item" id="nb-cupones" onclick="showMod('cupones')" style="display:none">
        <div class="nav-dot"></div>
        <svg viewBox="0 0 24 24"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
        Cupones
      </button>
    </div>

<script>
const FBCFG={

};
if(!firebase.apps.length)firebase.initializeApp(FBCFG);
const auth=firebase.auth(),db=firebase.firestore(),FV=()=>firebase.firestore.FieldValue;
const $=id=>document.getElementById(id);

// ── STATE ─────────────────────────────────────────────────────────────────────
let cu=null, stores=[], curStore=null, notes=[], coupons=[], users=[];
let _tfCouponColor='#18181b', _tfTextColor='#18181b';

function fmtDate(t){
  const d=new Date(t);
  return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();
}
function fmtC(n){return 'S/ '+Number(n||0).toLocaleString('es-PE',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtC0(n){return 'S/ '+Number(n||0).toLocaleString('es-PE',{maximumFractionDigits:0});}
function genCode(prefix){return (prefix||'NV').toUpperCase()+'-'+Math.random().toString(36).slice(2,6).toUpperCase();}
function isAdmin(){return ['superadmin','admin'].includes(cu?.role);}
function isSuperAdmin(){return cu?.role==='superadmin';}
function toast(msg,ms=2500){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),ms);}

// ── AUTH ──────────────────────────────────────────────────────────────────────
auth.onAuthStateChanged(async user=>{
  if(user){await loadApp(user);}
  else{showLogin();}
});
$('btn-li').onclick=async()=>{
  const em=$('li-em').value.trim(),pw=$('li-pw').value;
  const err=$('li-err');err.style.display='none';
  if(!em||!pw){err.textContent='Ingresa correo y contraseña.';err.style.display='block';return;}
  const btn=$('btn-li');btn.disabled=true;btn.textContent='Ingresando...';
  try{await auth.signInWithEmailAndPassword(em,pw);}
  catch(e){
    const msgs={'auth/invalid-credential':'Credenciales incorrectas.','auth/user-not-found':'Usuario no encontrado.'};
    err.textContent=msgs[e.code]||e.message;err.style.display='block';
  }finally{btn.disabled=false;btn.textContent='Iniciar sesión';}
};
$('li-pw').onkeydown=e=>{if(e.key==='Enter')$('btn-li').click();};
function showLogin(){$('pg-login').style.display='flex';$('pg-app').style.display='none';}
function doLogout(){if(!confirm('¿Cerrar sesión?'))return;listeners.forEach(u=>{try{u();}catch{}});auth.signOut();}

// ── LOAD APP ──────────────────────────────────────────────────────────────────
async function loadApp(fbUser){
  $('pg-login').style.display='none';$('pg-app').style.display='flex';
  try{
    let ud=null;
    try{
      ud=await db.collection('nv_users').doc(fbUser.uid).get();
    }catch(permErr){
      // Firestore rules not yet configured - show helpful message
      $('pg-app').style.display='none';$('pg-login').style.display='flex';
      const err=$('li-err');
      err.style.display='block';
      err.style.background='#fef3c7';err.style.color='#92400e';err.style.border='1px solid #fde68a';
      err.innerHTML='⚠️ <strong>Falta configurar Firestore.</strong><br>Ve a Firebase Console → Firestore → Reglas y agrega:<br><code style="font-size:10px;display:block;margin-top:6px;background:#fff3;padding:6px;border-radius:4px">match /nv_{document=**} {<br>&nbsp;&nbsp;allow read, write: if request.auth != null;<br>}</code>';
      return;
    }
    if(!ud||!ud.exists){
      // First login → create user as superadmin
      try{
        const userData={
          name:fbUser.displayName||fbUser.email.split('@')[0],
          email:fbUser.email,role:'superadmin',storeIds:[],
          createdAt:FV().serverTimestamp()
        };
        await db.collection('nv_users').doc(fbUser.uid).set(userData);
        cu={id:fbUser.uid,...userData};
      }catch(e2){
        // Can't write → still load with default role
        cu={id:fbUser.uid,name:fbUser.email.split('@')[0],email:fbUser.email,role:'superadmin',storeIds:[]};
      }
    } else {
      cu={id:fbUser.uid,...ud.data()};
    }
    // Setup UI
    const ini=(cu.name||'?').slice(0,2).toUpperCase();
    $('sb-av').textContent=ini;
    $('sb-nm').textContent=cu.name||cu.email||'—';
    $('sb-rl').textContent=isSuperAdmin()?'Super Admin':isAdmin()?'Administrador':'Vendedor';
    if(isSuperAdmin()||isAdmin()){
      $('nav-admin-lbl').style.display='block';
      $('nb-tiendas').style.display='flex';
      $('nb-vendedores').style.display='flex';
      $('nb-cupones').style.display='flex';
    }
    await loadStores();
    startListeners();
    showMod('dash');
  }catch(e){
    console.error('loadApp error:',e);
    toast('Error: '+e.message,4000);
  }
}

// ── STORES ────────────────────────────────────────────────────────────────────
async function loadStores(){
  let q=db.collection('nv_stores').orderBy('name');
  if(!isSuperAdmin()&&cu.storeIds?.length) q=db.collection('nv_stores');
  const snap=await q.get();
  stores=snap.docs.map(d=>({id:d.id,...d.data()}));
  if(!isSuperAdmin()) stores=stores.filter(s=>cu.storeIds?.includes(s.id));
  buildStoreSel();
  if(stores.length&&!curStore) selectStore(stores[0].id);
}

function buildStoreSel(){
  const sel=$('sb-store-sel');
  sel.innerHTML='<option value="">— Selecciona tienda —</option>'+
    stores.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
  if(curStore) sel.value=curStore.id;
}

function selectStore(id){
  curStore=stores.find(s=>s.id===id)||null;
  if(!curStore)return;
  const accent=curStore.color||'#2d7a4f';
  document.documentElement.style.setProperty('--store-accent',accent);
  $('sb-store-icon').textContent='';
  if(curStore.logoUrl){
    $('sb-store-icon').innerHTML=`<img src="${curStore.logoUrl}" style="width:100%;height:100%;object-fit:cover;border-radius:8px">`;
  } else {
    $('sb-store-icon').textContent=(curStore.name||'T').slice(0,2).toUpperCase();
    $('sb-store-icon').style.background=accent;
  }
  $('sb-store-nm').textContent=curStore.name||'Tienda';
  $('hdr-store-badge').textContent=curStore.name||'—';
  $('hdr-store-badge').style.background=accent;
  $('sb-av').style.background=accent;
  // Reload notes for this store
  startListeners();
  if(curMod==='dash')renderDash();
  else if(curMod==='hist')renderHist();
  else if(curMod==='nueva')renderNueva();
}

// ── LISTENERS ─────────────────────────────────────────────────────────────────
function startListeners(){
  listeners.forEach(u=>{try{u();}catch{}});listeners=[];
  if(!curStore)return;
  let q=db.collection('nv_notes').where('storeId','==',curStore.id).limit(300);
  const u=q.onSnapshot(s=>{
    let arr=s.docs.map(d=>({id:d.id,...d.data(),ts:d.data().createdAt?.toMillis()||Date.now()}));
    if(!isAdmin()) arr=arr.filter(n=>n.vendedorId===cu.id);
    arr.sort((a,b)=>b.ts-a.ts);
    notes=arr;
    if(curMod==='dash')renderDash();
    if(curMod==='hist')renderHist();
    if(curMod==='cupones')renderCupones();
  });
  listeners.push(u);
}

// ── NAV ───────────────────────────────────────────────────────────────────────
function showMod(mod){
  curMod=mod;
  ['dash','nueva','hist','tiendas','vendedores','cupones'].forEach(m=>{
    const el=$('mod-'+m);if(el)el.style.display=m===mod?'block':'none';
    const nb=$('nb-'+m);if(nb)nb.classList.toggle('on',m===mod);
  });
  const titles={dash:'Dashboard',nueva:'Nueva nota de venta',hist:'Historial de notas',
    tiendas:'Gestión de tiendas',vendedores:'Vendedores',cupones:'Cupones de descuento'};
  $('hdr-title').textContent=titles[mod]||mod;
  closeSidebar();
  // Sync mobile nav
  document.querySelectorAll('#mobile-nav button').forEach(b=>b.classList.remove('mn-on'));
  const mnBtn=document.getElementById('mn-'+mod);if(mnBtn)mnBtn.classList.add('mn-on');
  if(mod==='dash')renderDash();
  else if(mod==='nueva'){noteItems=[{desc:'',qty:1,price:''}];renderNueva();}
  else if(mod==='hist'){notePage=1;renderHist();}
  else if(mod==='tiendas')renderTiendas();
  else if(mod==='vendedores')renderVendedores();
  else if(mod==='cupones')renderCupones();
}
function openSidebar(){$('sidebar').classList.add('open');$('overlay').classList.add('on');}
function closeSidebar(){$('sidebar').classList.remove('open');$('overlay').classList.remove('on');}
function openModal(id){$(id).classList.add('open');}
function closeModal(id){$(id).classList.remove('open');}
document.querySelectorAll('.modal-ov').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function renderDash(){
  const el=$('mod-dash');if(!el)return;
  const today=new Date(),todayStart=new Date(today.getFullYear(),today.getMonth(),today.getDate()).getTime();
  const wStart=todayStart-6*86400000;
  const todayNotes=notes.filter(n=>n.ts>=todayStart);
  const weekNotes=notes.filter(n=>n.ts>=wStart);
  const totalIngresos=notes.filter(n=>n.ts>=wStart).reduce((s,n)=>s+(n.total||0),0);
  const couponUsed=notes.filter(n=>n.couponUsed).length;

function addItemRow(){noteItems.push({desc:'',qty:1,price:''});renderItemsRows();}
function removeItem(i){if(noteItems.length>1){noteItems.splice(i,1);renderItemsRows();}else{noteItems[0]={desc:'',qty:1,price:''};renderItemsRows();}}

function renderItemsRows(){
  const tb=$('items-tbody');if(!tb)return;
  tb.innerHTML=noteItems.map((it,i)=>`<tr>
    <td><input value="${it.desc||''}" placeholder="Descripción del producto" oninput="noteItems[${i}].desc=this.value;updatePreview()"></td>
    <td><input type="number" min="1" value="${it.qty||1}" style="width:52px;text-align:center" oninput="noteItems[${i}].qty=parseInt(this.value)||1;recalc()"></td>
    <td><input type="number" min="0" step="0.01" value="${it.price||''}" placeholder="0.00" style="text-align:right" oninput="noteItems[${i}].price=parseFloat(this.value)||0;recalc()"></td>
    <td style="text-align:right;font-weight:500;color:var(--tx2)">${fmtC((it.qty||1)*(it.price||0))}</td>
    <td class="rm-col"><button class="rm-btn" onclick="removeItem(${i})">✕</button></td>
  </tr>`).join('');
}

function recalc(){
  const sub=noteItems.reduce((s,it)=>s+(it.qty||1)*(it.price||0),0);
  const del=parseFloat($('n-del')?.value)||0;
  const tot=sub+del;
  const ade=parseFloat($('n-ade')?.value)||0;
  if($('n-sub'))$('n-sub').textContent=fmtC(sub);
  if($('n-tot'))$('n-tot').textContent=fmtC(tot);
  updatePreview();
}

function getNoteData(){
  const sub=noteItems.reduce((s,it)=>s+(it.qty||1)*(it.price||0),0);
  const del=parseFloat($('n-del')?.value)||0;
  const total=sub+del;
  const adelanto=parseFloat($('n-ade')?.value)||0;
  const saldo=Math.max(0,total-adelanto);
  return{
    cliente:$('n-cli')?.value||'',celular:$('n-cel')?.value||'',
    ciudad:$('n-ciu')?.value||'',zona:$('n-zona')?.value||'Provincia',
    dni:$('n-dni')?.value||'',
    payMethod:$('n-pay')?.value||'Yape',
    items:[...noteItems],subtotal:sub,delivery:del,total,adelanto,saldo,
    deliveryDate:$('n-fent')?.value||'',notas:$('n-notas')?.value||'',
    genCoupon:$('n-coupon')?.checked!==false
  };
}

function updatePreview(){
  const pv=$('preview-area');if(!pv||!curStore)return;
  const data=getNoteData();
  const fakeNote={...data,noteNum:'NV-XXXX',ts:Date.now(),vendedorNm:cu?.name||'',couponCode:'XXXX-0000'};
  pv.innerHTML=buildReceiptHTML(fakeNote,curStore,data.genCoupon);
}

async function generateNota(){
  if(!curStore){toast('Selecciona una tienda');return;}
  const data=getNoteData();
  if(!data.cliente||!data.celular){toast('Ingresa nombre y celular del cliente');return;}
  if(!data.items.some(it=>it.desc&&it.price>0)){toast('Agrega al menos un producto');return;}
  const btn=$('btn-gen-nota');btn.disabled=true;btn.textContent='Generando...';
  try{
    // Get next note number
    const storeRef=db.collection('nv_stores').doc(curStore.id);
    const noteNum=await db.runTransaction(async t=>{
      const sd=await t.get(storeRef);
      const n=(sd.data()?.lastNoteNum||0)+1;
      t.update(storeRef,{lastNoteNum:n});
      const prefix=(curStore.name||'NV').replace(/\s+/g,'').slice(0,3).toUpperCase();
      return prefix+'-'+String(n).padStart(4,'0');
    });
    const couponCode=data.genCoupon?genCode((curStore.name||'NV').slice(0,5)):null;
    const noteData={
      storeId:curStore.id,storeName:curStore.name,
      vendedorId:cu.id,vendedorNm:cu.name||cu.email,
      noteNum,
      ...data,
      couponCode,couponUsed:false,
      createdAt:FV().serverTimestamp(),
      ts:Date.now()
    };
    const ref=await db.collection('nv_notes').add(noteData);
    if(couponCode){
      await db.collection('nv_coupons').add({
        code:couponCode,noteId:ref.id,storeId:curStore.id,
        discount:curStore.couponDiscount||10,
        duration:curStore.couponDuration||90,
        used:false,
        expiresAt:Date.now()+(curStore.couponDuration||90)*86400000,
        createdAt:FV().serverTimestamp()
      });
    }
    curNoteForDL={...noteData,id:ref.id};
    toast('✓ Nota '+noteNum+' generada');
    $('receipt-render').innerHTML=buildReceiptHTML(curNoteForDL,curStore,true);
    openModal('ov-ver');
    noteItems=[{desc:'',qty:1,price:''}];
    renderNueva();
  }catch(e){toast('Error: '+e.message);}
  finally{btn.disabled=false;btn.textContent='Generar nota de venta';}
}

function viewNote(id){

// ── DOWNLOAD JPG / PDF ────────────────────────────────────────────────────────
async function downloadJPG(){
  const el=$('receipt-render').firstElementChild;
  if(!el){toast('Error: no hay recibo');return;}
  try{
    const canvas=await html2canvas(el,{scale:2,useCORS:true,backgroundColor:'#fff'});
    const a=document.createElement('a');
    a.href=canvas.toDataURL('image/jpeg',0.95);
    a.download=(curNoteForDL?.noteNum||'nota')+'.jpg';
    a.click();
    toast('✓ JPG descargado');
  }catch(e){toast('Error al generar JPG: '+e.message);}
}
async function downloadPDF(){
  const el=$('receipt-render').firstElementChild;
  if(!el){toast('Error: no hay recibo');return;}
  try{
    const canvas=await html2canvas(el,{scale:2,useCORS:true,backgroundColor:'#fff'});
    const {jsPDF}=window.jspdf;
    const pdf=new jsPDF({unit:'px',format:[canvas.width/2,canvas.height/2]});
    pdf.addImage(canvas.toDataURL('image/jpeg',0.95),'JPEG',0,0,canvas.width/2,canvas.height/2);
    pdf.save((curNoteForDL?.noteNum||'nota')+'.pdf');
    toast('✓ PDF descargado');
  }catch(e){toast('Error al generar PDF: '+e.message);}
}
async function sendWA(){
  if(!curNoteForDL||!curStore)return;
  const n=curNoteForDL, s=curStore;
  const waBtn=document.getElementById('wa-btn');
  if(waBtn){waBtn.disabled=true;waBtn.textContent='Generando JPG...';}
  try{
    // Generate JPG from receipt
    const el=document.getElementById('receipt-render').firstElementChild;
    if(!el)throw new Error('No hay recibo visible');
    const canvas=await html2canvas(el,{scale:2.5,useCORS:true,backgroundColor:'#fff',logging:false});
    const blob=await new Promise(res=>canvas.toBlob(res,'image/jpeg',0.95));
    const fileName=(n.noteNum||'nota')+'.jpg';
    const file=new File([blob],fileName,{type:'image/jpeg'});
    const cel=(n.celular||'').replace(/\D/g,'');
    // Try Web Share API (Android/iOS native share → WhatsApp)
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      await navigator.share({
        files:[file],
        title:'Nota de venta '+n.noteNum,
        text:'Nota de venta '+s.name
      });
    } else {
      // Fallback: download JPG + open WhatsApp text
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url;a.download=fileName;a.click();
      URL.revokeObjectURL(url);
      setTimeout(()=>{
        const msg='Hola '+n.cliente+'! Te adjunto tu nota de venta *'+n.noteNum+'* de '+s.name+'. Total: '+fmtC(n.total)+(n.couponCode?' | Cupón: '+n.couponCode:'');
        window.open('https://wa.me/51'+cel+'?text='+encodeURIComponent(msg),'_blank');
      },800);
      toast('JPG descargado — ábrelo y envíalo por WhatsApp');
    }
  }catch(e){
    if(e.name!=='AbortError')toast('Error: '+e.message);
  }finally{
    if(waBtn){waBtn.disabled=false;waBtn.innerHTML='<span style="font-size:16px">✉️</span> Enviar JPG por WhatsApp';}
  }
}

function openTiendaForm(id){
  _editingStoreId=id||null;_tfLogoB64=null;_tfColor='#2d7a4f';
  const s=id?stores.find(x=>x.id===id):null;
  $('tf-title').textContent=s?'Editar tienda':'Nueva tienda';
  $('tf-nm').value=s?.name||'';$('tf-cat').value=s?.category||'Calzado';
  $('tf-tel').value=s?.phone||'';$('tf-addr').value=s?.address||'';
  $('tf-ig').value=s?.instagram||'';$('tf-web').value=s?.web||'';
  $('tf-foot').value=s?.footerMsg||'';
  $('tf-disc').value=s?.couponDiscount||10;$('tf-cdur').value=s?.couponDuration||90;
  $('tf-hbg').value=s?.headerBg||'dark';
  const ccEl=$('tf-ccolor');if(ccEl)ccEl.value=s?.couponColor||'#1a1a2e';
  const tcEl=$('tf-tcolor');if(tcEl)tcEl.value=s?.receiptTextColor||'#18181b';
  const fsEl=$('tf-fsize');if(fsEl)fsEl.value=String(s?.receiptFontSize||13);
  $('tf-err').style.display='none';
  if(s?.color){_tfColor=s.color;selectColor(s.color,null);}
  _tfCouponColor=s?.couponColor||'#18181b';
  _tfTextColor=s?.textColor||'#18181b';
  if($('tf-coupon-color'))$('tf-coupon-color').value=_tfCouponColor;
  if($('tf-text-color'))$('tf-text-color').value=_tfTextColor;
  if($('tf-fontsize'))$('tf-fontsize').value=s?.fontSize||'md';
  document.querySelectorAll('.color-chip[data-cc]').forEach(ch=>ch.classList.toggle('on',ch.dataset.cc===_tfCouponColor));
  // Logo preview
  $('tf-logo-ph').textContent=(s?.name||'T').slice(0,2).toUpperCase();
  $('tf-logo-ph').style.background=_tfColor;
  if(s?.logoUrl){
    $('tf-logo-prev').innerHTML=`<img class="logo-preview-lg" src="${s.logoUrl}">`;
  } else {
    $('tf-logo-prev').innerHTML=`<div class="logo-placeholder" id="tf-logo-ph" style="background:${_tfColor}">${(s?.name||'T').slice(0,2).toUpperCase()}</div>`;
  }
  openModal('ov-tienda');
}
function editTienda(id){openTiendaForm(id);}

// Logo upload
function selectCouponColor(c,el){
  _tfCouponColor=c;
  document.querySelectorAll('.color-chip[data-cc]').forEach(ch=>ch.classList.remove('on'));
  if(el)el.classList.add('on');
  $('tf-coupon-color').value=c;
}
function selectTextColor(c,el){
  _tfTextColor=c;
  document.querySelectorAll('.tc-chip').forEach(ch=>{ch.classList.remove('on');ch.style.borderColor='transparent';});
  if(el){el.classList.add('on');el.style.borderColor='var(--tx)';}
  $('tf-text-color').value=c;
}
$('tf-logo-inp').onchange=function(e){
  const f=e.target.files[0];if(!f)return;
  if(f.size>5*1024*1024){toast('Imagen máx 5MB');return;}
  const r=new FileReader();
  r.onload=ev=>{
    _tfLogoB64=ev.target.result;
    $('tf-logo-prev').innerHTML=`<img class="logo-preview-lg" src="${_tfLogoB64}">`;
  };
  r.readAsDataURL(f);
};

function selectColor(c,el){
  _tfColor=c;
  document.querySelectorAll('.color-chip').forEach(ch=>ch.classList.remove('on'));
  if(el)el.classList.add('on');
  $('tf-color-val').textContent=c;
  $('tf-color-custom').value=c;
  const ph=$('tf-logo-ph');if(ph)ph.style.background=c;
}

async function saveTienda(){
  const nm=($('tf-nm')?.value||'').trim();
  const err=$('tf-err');if(err)err.style.display='none';
  if(!nm){if(err){err.textContent='Ingresa el nombre de la tienda';err.style.display='block';}return;}
  const btn=$('btn-tf');if(btn){btn.disabled=true;btn.textContent='Guardando...';}
  try{
    const data={
      name:nm,
      category:$('tf-cat')?.value||'',
      phone:$('tf-tel')?.value||'',
      address:$('tf-addr')?.value||'',
      instagram:$('tf-ig')?.value||'',
      web:$('tf-web')?.value||'',
      footerMsg:$('tf-foot')?.value||'',
      color:_tfColor,
      headerBg:$('tf-hbg')?.value||'dark',
      couponDiscount:parseFloat($('tf-disc')?.value)||10,
      couponDuration:parseInt($('tf-cdur')?.value)||90,
      couponColor:$('tf-ccolor')?.value||'#1a1a2e',
      receiptTextColor:$('tf-tcolor')?.value||'#18181b',
      receiptFontSize:parseInt($('tf-fsize')?.value)||13,
      updatedAt:FV().serverTimestamp()
    };
    if(_tfLogoB64)data.logoUrl=_tfLogoB64;
    if(_editingStoreId){
      await db.collection('nv_stores').doc(_editingStoreId).update(data);
      const si=stores.findIndex(s=>s.id===_editingStoreId);
      if(si>=0)stores[si]={...stores[si],...data};
      if(curStore?.id===_editingStoreId){curStore={...curStore,...data};selectStore(_editingStoreId);}
    } else {
      data.createdAt=FV().serverTimestamp();data.lastNoteNum=0;
      const ref=await db.collection('nv_stores').add(data);
      const newStore={id:ref.id,...data};
      stores.push(newStore);
      buildStoreSel();
      selectStore(ref.id);
    }
    buildStoreSel();
    closeModal('ov-tienda');
    renderTiendas();
    toast('✓ Tienda guardada: '+nm);
  }catch(e2){
    if(err){err.textContent='Error: '+e2.message;err.style.display='block';}
    else toast('Error: '+e2.message);
  }
  finally{if(btn){btn.disabled=false;btn.textContent='Guardar tienda';}}
};

async function deleteTienda(id){
  const s=stores.find(x=>x.id===id);
  if(!confirm(`¿Eliminar la tienda "${s?.name}"?\nSus notas no se eliminarán.`))return;
  try{await db.collection('nv_stores').doc(id).delete();stores=stores.filter(x=>x.id!==id);buildStoreSel();renderTiendas();toast('✓ Tienda eliminada');}
  catch(e){toast('Error: '+e.message);}
}

// ── VENDEDORES ─────────────────────────────────────────────────────────────────
async function renderVendedores(){
  const el=$('mod-vendedores');if(!el)return;
  el.innerHTML='<div class="spin"></div>';
  try{
    const snap=await db.collection('nv_users').get();
    users=snap.docs.map(d=>({id:d.id,...d.data()}));
    el.innerHTML=`
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <div style="font-size:14px;font-weight:600">${users.length} usuario${users.length!==1?'s':''}</div>
        <button class="btn btn-primary btn-sm" onclick="openVendForm()">+ Nuevo vendedor</button>
      </div>
      <div class="tbl-wrap">
        <table><thead><tr><th>Nombre</th><th>Correo</th><th>Rol</th><th>Tiendas</th><th>Notas</th><th></th></tr></thead>
        <tbody>${users.map(u=>{
          const storeNms=(u.storeIds||[]).map(id=>stores.find(s=>s.id===id)?.name||id).filter(Boolean).join(', ')||'Todas';
          const userNotes=notes.filter(n=>n.vendedorId===u.id).length;
          return `<tr>
            <td style="font-weight:500">${u.name||'—'}</td>
            <td style="font-size:11px;color:var(--tx2)">${u.email||'—'}</td>
            <td><span class="badge ${u.role==='superadmin'?'badge-ok':u.role==='admin'?'badge-lima':'badge-prov'}">${u.role||'vendedor'}</span></td>
            <td style="font-size:11px;color:var(--tx2)">${storeNms}</td>
            <td style="font-weight:500">${userNotes}</td>
            <td><button class="btn btn-secondary btn-sm" onclick="toggleUserRole('${u.id}','${u.role}')">Cambiar rol</button></td>
          </tr>`;
        }).join('')||`<tr><td colspan="6"><div class="empty">Sin usuarios</div></td></tr>`}
        </tbody></table>
      </div>`;
  }catch(e){el.innerHTML=`<div class="empty">Error: ${e.message}</div>`;}
}

function openVendForm(){
  $('vf-nm').value='';$('vf-em').value='';$('vf-pw').value='';
  $('vf-rol').value='vendedor';$('vf-err').style.display='none';
  $('vf-title').textContent='Nuevo vendedor';
  // Store checkboxes
  $('vf-stores-chk').innerHTML=stores.map(s=>`
    <label style="display:flex;align-items:center;gap:5px;padding:4px 8px;background:var(--bg3);
      border-radius:6px;cursor:pointer;font-size:12px">
      <input type="checkbox" value="${s.id}" style="width:13px;height:13px">
      <span style="width:8px;height:8px;border-radius:50%;background:${s.color||'#2d7a4f'};flex-shrink:0"></span>
      ${s.name}
    </label>`).join('');
  openModal('ov-vend');
}

$('btn-vf').onclick=async function(){
  const nm=$('vf-nm').value.trim(),em=$('vf-em').value.trim(),pw=$('vf-pw').value;
  const err=$('vf-err');err.style.display='none';
  if(!nm||!em||!pw){err.textContent='Completa todos los campos';err.style.display='block';return;}
  if(pw.length<6){err.textContent='La contraseña debe tener al menos 6 caracteres';err.style.display='block';return;}
  const storeIds=[...document.querySelectorAll('#vf-stores-chk input:checked')].map(c=>c.value);
  const btn=$('btn-vf');btn.disabled=true;btn.textContent='Creando...';
  try{
    const cred=await auth.createUserWithEmailAndPassword(em,pw);
    await db.collection('nv_users').doc(cred.user.uid).set({
      name:nm,email:em,role:$('vf-rol').value,storeIds,
      createdAt:FV().serverTimestamp()
    });
    closeModal('ov-vend');renderVendedores();toast('✓ Vendedor creado: '+nm);
  }catch(e){err.textContent='Error: '+e.message;err.style.display='block';}
  finally{btn.disabled=false;btn.textContent='Crear vendedor';}
};

async function toggleUserRole(uid,currentRole){
  const roles=['vendedor','admin','superadmin'];
  const next=roles[(roles.indexOf(currentRole)+1)%roles.length];
  if(!confirm(`Cambiar rol a "${next}"?`))return;
  try{await db.collection('nv_users').doc(uid).update({role:next});renderVendedores();toast('✓ Rol actualizado');}
  catch(e){toast('Error: '+e.message);}
}

// ── CUPONES ────────────────────────────────────────────────────────────────────
function renderCupones(){
  const el=$('mod-cupones');if(!el)return;
  if(!curStore){el.innerHTML='<div class="empty">Selecciona una tienda primero</div>';return;}
  el.innerHTML='<div class="spin"></div>';
  db.collection('nv_coupons').where('storeId','==',curStore.id).get()
    .then(function(snap){
      const cps=snap.docs.map(function(d){
        const data=d.data();
        return {id:d.id,...data,ts:data.createdAt?.toMillis?.()??0};
      }).sort(function(a,b){return b.ts-a.ts;});
      const used=cps.filter(function(c){return c.used;}).length;
      el.innerHTML=`
        <div class="kpi-grid" style="grid-template-columns:repeat(3,1fr);max-width:560px;margin-bottom:20px">
          <div class="kpi"><div class="kpi-lbl">Total cupones</div><div class="kpi-val">${cps.length}</div></div>
          <div class="kpi"><div class="kpi-lbl">Canjeados</div><div class="kpi-val" style="color:var(--store-accent,#2d7a4f)">${used}</div></div>
          <div class="kpi"><div class="kpi-lbl">Activos</div><div class="kpi-val">${cps.length-used}</div></div>
        </div>
        <div class="tbl-wrap">
          <table>
            <thead><tr><th>Código</th><th>Descuento</th><th>Estado</th><th>Nota</th><th>Vence</th><th>Fecha</th></tr></thead>
            <tbody>
              ${cps.length?cps.map(function(c){return '<tr>'+
                '<td><span style="font-family:var(--mono);font-weight:600;color:var(--store-accent,#2d7a4f)">'+c.code+'</span></td>'+
                '<td style="font-weight:500">S/ '+(c.discount||10)+'</td>'+
                '<td><span class="badge '+(c.used?'badge-pen':'badge-ok')+'">'+(c.used?'Canjeado':'Activo')+'</span></td>'+
                '<td style="font-family:var(--mono);font-size:11px;color:var(--tx3)">'+(c.noteId?c.noteId.slice(-6):'—')+'</td>'+
                '<td style="font-size:11px;color:var(--tx3)">'+(c.expiresAt?fmtDate(c.expiresAt):'—')+'</td>'+
                '<td style="font-size:11px;color:var(--tx3)">'+(c.ts?fmtDate(c.ts):'—')+'</td>'+
              '</tr>';}).join(''):'<tr><td colspan="6"><div class="empty">Sin cupones registrados en esta tienda</div></td></tr>'}
            </tbody>
          </table>
        </div>`;
    })
    .catch(function(e){
      el.innerHTML='<div class="empty">Error al cargar cupones: '+e.message+'</div>';
    });
}
